<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Tippeliga Live - VM 2026 resultater og poengstilling">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>⚽</text></svg>">
<title>Tippeliga Live</title>

<style>
/* Base */
* { box-sizing: border-box; }
body { margin:0; font-family: system-ui, -apple-system, 'Segoe UI', Roboto; background:#070914; color:#e8eef8; -webkit-font-smoothing:antialiased; }
.header { text-align:center; padding:14px; background:linear-gradient(180deg,#0d1724, #0b1220); border-bottom:1px solid #102334; position:sticky; top:0; z-index:10; }
.title { font-size:20px; font-weight:800; letter-spacing:1px; margin:0; }
.sub { font-size:12px; color:#9fb0cc; margin:8px 0; }
.controls { margin-top:8px; display:flex; justify-content:center; gap:8px; align-items:center; }
.btn { padding:8px 12px; background:transparent; border:1px solid #21445f; color:#bfbfbf; border-radius:8px; cursor:pointer; font-weight:600; }
.btn:hover { background:#0f2a3c22; }
.btn.loading { opacity:0.6; cursor:not-allowed; }
.tabs { margin-top:10px; display:flex; justify-content:center; gap:8px; }
.tab { padding:8px 14px; border-radius:999px; background:#071826; border:1px solid transparent; color:#9fb0cc; cursor:pointer; font-size:13px; }
.tab.active { background:linear-gradient(90deg,#14324a,#2a6b9a); color:white; box-shadow:0 6px 18px rgba(10,40,60,0.45); }
.container { max-width:980px; margin:12px auto; padding:0 12px 60px; }
.card { background:#071123; border:1px solid #112233; margin:10px 0; padding:12px; border-radius:10px; }
.row { display:flex; justify-content:space-between; align-items:center; }
.player-name { font-weight:700; }
.gold { color:#f0c95d; font-weight:800; }
.match-info { font-size:13px; color:#d8eefc; margin-top:8px; padding-top:8px; border-top:1px solid #132634; }
.match-row { display:flex; justify-content:space-between; margin:6px 0; font-size:14px; }
.match-score { color:#bfe0ff; font-weight:700; }
.error-box { background:#3a1a1a; border:1px solid #8a3a3a; color:#ff8b8b; padding:12px; border-radius:8px; margin:10px 0; }
.empty-state { text-align:center; padding:40px 20px; color:#7a8ba8; }
.small { font-size:12px; color:#9fb0cc; }

/* Matches table / list */
.matches-day { margin:8px 0; }
.matches-day summary { font-weight:700; font-size:15px; color:#dfeffb; padding:8px 10px; background:#071a28; border-radius:8px; cursor:pointer; }
.match-card { padding:10px; border-radius:8px; background:linear-gradient(180deg,#06121a,#06141c); margin:8px 0; border:1px solid #0e2230; }
.match-meta { color:#9fb0cc; font-size:12px; margin-top:6px; }
.player-tips { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
.tip-pill { background:#0f2a3a; padding:6px 8px; border-radius:999px; font-size:13px; color:#e6f7ff; border:1px solid #123347; }

/* Leaderboard details */
details.player { background:#061123; border:1px solid #0e2230; padding:8px; border-radius:8px; margin:8px 0; }
details.player summary{ display:flex; justify-content:space-between; align-items:center; list-style:none; cursor:pointer; padding:6px 8px; }
.details-row { display:flex; justify-content:space-between; gap:12px; }
.details-list { margin-top:8px; }
.details-item { display:flex; justify-content:space-between; padding:8px; border-radius:6px; background:#071523; margin-bottom:6px; align-items:center; }
.details-item .left { font-size:14px; }
.details-item .right { font-weight:700; }

/* Mobile-first adjustments */
@media (max-width:700px){
  .container { padding:0 10px 80px; }
  .title { font-size:18px; }
  .player-name { font-size:15px; }
  .match-row { font-size:13px; }
  .player-tips { gap:6px; }
}

</style>
</head>
<body>

<div class="header">
  <h1 class="title">⚽ TIPPELIGA LIVE</h1>
  <div class="sub" id="status">Starter…</div>
  <div class="controls">
    <button class="btn" id="updateBtn" onclick="handleUpdate()">↻ Oppdater</button>
    <div class="small" id="matchCount"></div>
  </div>
  <div class="tabs">
    <div class="tab active" id="tabLeaderboard" onclick="setTab('leaderboard')">Live tippetabell</div>
    <div class="tab" id="tabMatches" onclick="setTab('matches')">Alle kamper & tips</div>
  </div>
</div>

<div class="container">
  <div id="errors"></div>
  <div id="app"></div>
</div>

<script>
// Note: Reverted to client-side fetching via CORS proxy so the site works from GitHub Pages.
// If you later deploy the server proxy (server/index.js), we can switch back to SSE and /api/matches.

const API_KEY = "532ab6db012744d0912eedbd40c4764d"; // frontend key (exposed) — rotate if needed
const COMPETITION_ID = 'WC';
const PLAYERS = ["Staals","Kong","Dox","Jojo","Marko","Barra"];
const MATCHES = [
  {id:1, home:"Mexico", away:"South Africa", tips:["3-0","2-1","2-0","3-1","2-1","3-0"]},
  {id:2, home:"South Korea", away:"Czechia", tips:["2-1","1-1","1-1","2-3","1-0","1-2"]},
  {id:3, home:"Canada", away:"Bosnia and Herzegovina", tips:["1-1","0-1","2-1","2-0","1-1","2-0"]},
  {id:4, home:"United States", away:"Paraguay", tips:["2-1","1-1","0-0","2-3","3-0","2-1"]},
  {id:5, home:"Qatar", away:"Switzerland", tips:["0-3","0-3","0-1","1-3","0-2","0-3"]},
  {id:6, home:"Brazil", away:"Morocco", tips:["2-2","1-1","3-1","2-2","2-1","2-1"]},
  {id:7, home:"Haiti", away:"Scotland", tips:["0-3","0-0","0-3","0-2","0-3","0-2"]},
  {id:8, home:"Australia", away:"Turkey", tips:["0-1","0-2","1-3","0-2","1-2","0-2"]},
  {id:9, home:"Germany", away:"Curaçao", tips:["6-0","3-0","5-0","4-0","4-0","3-0"]},
  {id:10, home:"Netherlands", away:"Japan", tips:["1-1","2-1","1-2","1-2","1-1","3-1"]},
  {id:11, home:"Ivory Coast", away:"Ecuador", tips:["1-2","1-0","1-1","0-3","3-3","1-2"]},
  {id:12, home:"Sweden", away:"Tunisia", tips:["2-1","1-1","1-1","2-2","1-1","1-0"]},
  {id:13, home:"Spain", away:"Cape Verde", tips:["3-0","3-0","3-0","5-0","3-0","3-0"]},
  {id:14, home:"Belgium", away:"Egypt", tips:["2-2","2-0","1-0","2-1","2-1","2-0"]},
  {id:15, home:"Saudi Arabia", away:"Uruguay", tips:["0-2","0-2","0-3","0-3","2-2","0-1"]},
  {id:16, home:"Iran", away:"New Zealand", tips:["2-0","1-1","0-0","2-1","1-1","1-0"]},
  {id:17, home:"France", away:"Senegal", tips:["2-2","3-1","2-1","2-1","3-1","2-0"]},
  {id:18, home:"Iraq", away:"Norway", tips:["1-2","1-3","1-1","1-3","1-4","1-2"]},
  {id:19, home:"Argentina", away:"Algeria", tips:["3-1","2-0","2-0","2-0","2-1","3-1"]},
  {id:20, home:"Austria", away:"Jordan", tips:["2-2","1-0","2-1","2-0","3-0","2-0"]}
];

let results = {};
let lastFetchTime = null;
let isFetching = false;
let fetchRetries = 0;
const MAX_RETRIES = 3;
let currentTab = 'leaderboard';

// enhanced normalization + tokenization to handle variations (and stopwords)
const STOPWORDS = ['and','islands','the','of','republic','democratic','islamic','cote','ivoire','saint','st','kingdom','federation','united','arab','cape'];
function normalize(str){ if(!str) return ''; return String(str).toLowerCase().normalize('NFD').replace(/\p{Diacritic}/gu,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim(); }
function tokens(str){ if(!str) return []; const t = normalize(str).split(' ').filter(Boolean).filter(w=>!STOPWORDS.includes(w)); return t; }
function namesMatchRaw(rawA, rawB){ // robust matching using normalized tokens and substring checks
  const a = normalize(rawA); const b = normalize(rawB);
  if(!a || !b) return false;
  if(a === b) return true;
  if(a.includes(b) || b.includes(a)) return true;
  const ta = tokens(rawA), tb = tokens(rawB);
  if(ta.length===0 || tb.length===0) return false;
  const inter = ta.filter(x=>tb.includes(x)).length;
  const minLen = Math.min(ta.length, tb.length);
  if(minLen>0 && (inter / minLen) >= 0.5) return true; // 50% token overlap
  return false;
}

function points(actual, tip){ if(!actual) return 0; if(actual===tip) return 4; try{ const a=actual.split('-').map(Number); const t=tip.split('-').map(Number); if(a.length!==2||t.length!==2) return 0; const ra=Math.sign(a[0]-a[1]); const rt=Math.sign(t[0]-t[1]); return ra===rt?2:0; }catch(e){return 0;} }

function setStatus(text,isError=false){ const el=document.getElementById('status'); el.innerText=text; el.style.color=isError? '#ff6b6b' : '#9fb0cc'; }
function showError(msg){ document.getElementById('errors').innerHTML=`<div class="error-box">⚠️ ${msg}</div>`; }
function clearErrors(){ document.getElementById('errors').innerHTML=''; }

async function fetchLive(){
  if(isFetching){ setStatus('Henter allerede...'); return; }
  isFetching=true; document.getElementById('updateBtn').classList.add('loading'); setStatus('Henter live data...'); clearErrors();
  try{
    const controller=new AbortController(); const timeoutId=setTimeout(()=>controller.abort(),30000);
    const proxyUrl = "https://corsproxy.io/?";
    const apiUrl = `https://api.football-data.org/v4/competitions/${COMPETITION_ID}/matches?limit=500`;
    const res = await fetch(proxyUrl + encodeURIComponent(apiUrl), {
      method: 'GET',
      headers: { 'X-Auth-Token': API_KEY },
      signal: controller.signal
    });
    clearTimeout(timeoutId);
    if(!res.ok) throw new Error(`Proxy svar: ${res.status}`);
    const data = await res.json(); console.log('API Response:',data);
    if(!data||!Array.isArray(data.matches)) throw new Error('Ugyldig API respons');

    const updated={...results}; let matchedCount=0; let totalFetched=data.matches.length; console.log(`📊 Sjekker ${totalFetched} kamper fra API...`);
    data.matches.forEach(match=>{
      try{
        const rawHome = match.homeTeam && (match.homeTeam.name || match.homeTeam.shortName || match.homeTeam.tla || match.homeTeam.id) ? (match.homeTeam.name || match.homeTeam.shortName || match.homeTeam.tla || String(match.homeTeam.id)) : '';
        const rawAway = match.awayTeam && (match.awayTeam.name || match.awayTeam.shortName || match.awayTeam.tla || match.awayTeam.id) ? (match.awayTeam.name || match.awayTeam.shortName || match.awayTeam.tla || String(match.awayTeam.id)) : '';
        const fullHome = match.score && match.score.fullTime ? match.score.fullTime.home : null;
        const fullAway = match.score && match.score.fullTime ? match.score.fullTime.away : null;
        const score = (fullHome!==null && fullHome!==undefined) ? `${fullHome}-${fullAway}` : null;

        // Try to find by robust raw-name matching first; include orientation swap
        const foundMatch = MATCHES.find(m=>{
          if(namesMatchRaw(m.home, rawHome) && namesMatchRaw(m.away, rawAway)) return true;
          if(namesMatchRaw(m.home, rawAway) && namesMatchRaw(m.away, rawHome)) return true;
          // fallback: token overlap with API tla if present
          const apiHomeTla = match.homeTeam && match.homeTeam.tla ? String(match.homeTeam.tla).toLowerCase() : '';
          const apiAwayTla = match.awayTeam && match.awayTeam.tla ? String(match.awayTeam.tla).toLowerCase() : '';
          if(apiHomeTla && apiAwayTla){ const mh = normalize(m.home).split(' ')[0]; const ma = normalize(m.away).split(' ')[0]; if(mh===apiHomeTla || ma===apiAwayTla) return true; }
          return false;
        });

        if(foundMatch){ updated[foundMatch.id] = { score: score, status: match.status, date: match.utcDate, homeName: rawHome, awayName: rawAway }; if(score) matchedCount++; console.log(`✓ Matched: ${rawHome} ${score||'ikke spilt'} ${rawAway}`); }
        else { if(rawHome||rawAway) console.log(`○ Ikke i listen: ${rawHome||'?'} vs ${rawAway||'?'} (norm: ${normalize(rawHome)} vs ${normalize(rawAway)})`); }
      }catch(e){ console.error('Error processing match',e,match); }
    });

    results=updated; fetchRetries=0; lastFetchTime=new Date(); render(); setStatus(`Oppdatert: ${lastFetchTime.toLocaleTimeString()} (${matchedCount}/${MATCHES.length})`);
    console.log(`✓ Total hentet: ${totalFetched} kamper, matched ${matchedCount} ferdige`);
  }catch(error){ console.error('Fetch error:', error); if(fetchRetries<MAX_RETRIES){ fetchRetries++; setStatus(`Forsøker igjen (${fetchRetries}/${MAX_RETRIES})...`, true); setTimeout(fetchLive,2000+(fetchRetries*1000)); } else { showError(`Kunne ikke hente data: ${error.message}`); setStatus('Feil ved henting - prøv igjen senere', true); } }
  finally{ isFetching=false; document.getElementById('updateBtn').classList.remove('loading'); }
}

// NOTE: SSE (EventSource) is disabled for GitHub Pages client-only setup to avoid 404 errors.
function initSSE(){ /* no-op when running client-only on GitHub Pages */ }

function render(){ if(currentTab==='leaderboard') renderLeaderboard(); else renderMatches(); updateMatchCount(); }

function renderLeaderboard(){
  const scores = PLAYERS.map((p,i)=>{ let total=0; let details=[]; MATCHES.forEach(m=>{ if(results[m.id] && results[m.id].score){ const pts = points(results[m.id].score, m.tips[i]); total+=pts; details.push({ home:m.home, away:m.away, tip:m.tips[i], actual:results[m.id].score, points:pts }); } }); return { p, total, details }; }).sort((a,b)=>b.total-a.total);

  const app=document.getElementById('app'); if(scores.every(s=>s.total===0) && Object.keys(results).length===0){ app.innerHTML=`<div class="empty-state">⏳ Venter på kamper...</div>`; return; }

  let html = `<div class="card"><div class="row"><div style="font-weight:800">Live tippetabell</div><div class="small">Oppdatert: ${ lastFetchTime ? lastFetchTime.toLocaleTimeString() : '—' }</div></div></div>`;
  html += scores.map((s,idx)=>{
    const detailsHtml = s.details.length ? s.details.map(d=>`<div class="details-item"><div class="left">${d.home} vs ${d.away}<div class="small">Tip: ${d.tip}</div></div><div class="right">${d.actual||'–'} <span style="color:#7be2a4; font-weight:700">${d.actual?('+'+d.points):''}</span></div></div>`).join('') : '<div class="small">Ingen ferdige kamper enda</div>';
    return `
      <details class="player" ${idx<3? 'open':''}>
        <summary>
          <div class="details-row"><div>${idx+1}. <span class="player-name">${s.p}</span></div><div class="gold">${s.total} pts</div></div>
        </summary>
        <div class="details-list">${detailsHtml}</div>
      </details>
    `;
  }).join('');
  app.innerHTML = html;
}

function renderMatches(){
  const app=document.getElementById('app');
  // played matches
  const played = MATCHES.filter(m=> results[m.id] && results[m.id].score);
  // upcoming matches (still include tips so users can see them)
  const upcoming = MATCHES.filter(m=> !results[m.id] || !results[m.id].score);

  let html = `<div class="card"><div style="font-weight:800">Kamper</div><div class="small">Ferdigspilte kamper er gruppert per dag. Kommende kamper vises under "Kommende".</div></div>`;

  if(played.length===0){ html += `<div class="card"><div class="empty-state">Ingen kamper er ferdigspilt enda.</div></div>`; }
  else {
    // group played matches by local date
    const byDay = {};
    played.forEach(m=>{ const r = results[m.id]; const date = r.date ? new Date(r.date) : null; const dayStr = date ? date.toLocaleDateString('no-NO', { weekday:'short', day:'2-digit', month:'short' }) : 'Ukjent dato'; if(!byDay[dayStr]) byDay[dayStr]=[]; byDay[dayStr].push({ match:m, res:r }); });
    const dayKeys = Object.keys(byDay).sort((a,b)=> new Date(byDay[b][0].res.date) - new Date(byDay[a][0].res.date));
    dayKeys.forEach(day=>{ const items = byDay[day]; html += `<details class="matches-day"><summary>${day} — ${items.length} kamp(er)</summary><div style="margin-top:8px">`; items.forEach(it=>{ const m = it.match; const r = it.res; html += `<div class="match-card"><div class="match-row"><div><strong>${m.home}</strong> vs <strong>${m.away}</strong></div><div class="match-score">${r.score}</div></div><div class="match-meta small">Status: ${r.status || '—'} • Spilt: ${ r.date ? new Date(r.date).toLocaleTimeString() : '—' }</div><div class="player-tips">${m.tips.map((t,i)=>`<div class="tip-pill">${PLAYERS[i]}: ${t} ${ r.score ? (' → '+points(r.score,t)+'p') : '' }</div>`).join('')}</div></div>`; }); html += `</div></details>`; });
  }

  // Upcoming matches (show tips even if not played)
  if(upcoming.length>0){ html += `<div class="card"><div style="font-weight:800">Kommende kamper</div><div class="small">Viser tips for kommende kamper.</div></div>`; upcoming.forEach(m=>{ html += `<div class="match-card"><div class="match-row"><div><strong>${m.home}</strong> vs <strong>${m.away}</strong></div><div class="match-meta small">ID: ${m.id}</div></div><div class="player-tips">${m.tips.map((t,i)=>`<div class="tip-pill">${PLAYERS[i]}: ${t}</div>`).join('')}</div></div>`; }); }

  app.innerHTML = html;
}

function updateMatchCount(){ const playedCount = MATCHES.filter(m=> results[m.id] && results[m.id].score).length; document.getElementById('matchCount').innerText = `${playedCount} / ${MATCHES.length} kamper oppdatert`; }

function setTab(tab){ currentTab=tab; document.getElementById('tabLeaderboard').classList.toggle('active', tab==='leaderboard'); document.getElementById('tabMatches').classList.toggle('active', tab==='matches'); render(); }
async function handleUpdate(){ await fetchLive(); }

// Init
window.addEventListener('load', ()=>{ console.log('🚀 Tippeliga Live starter med football-data.org...'); console.log('✓ API Key set'); console.log('✓ Competition: World Cup 2026'); console.log('✓ Matches loaded:', MATCHES.length); console.log('✓ Using CORS proxy'); fetchLive(); /* SSE disabled for GitHub Pages client-only setup */ });
// Auto-update every 30s
setInterval(fetchLive, 30000);
// Update status every second
setInterval(()=>{ if(lastFetchTime){ const diff=Math.floor((Date.now()-lastFetchTime)/1000); const min=Math.floor(diff/60); const sec=diff%60; const timeStr = min>0?`${min}m ${sec}s siden`:`${sec}s siden`; document.getElementById('status').innerText = `Sist oppdatert: ${timeStr}`; } },1000);

</script>

</body>
</html>
