/* ============================================================
   FIFA TLA-KODER -> PAALITELIG MATCHING

   ============================================================ */
var TEAM_TLA = {

  var h = TEAM_TLA[m.home], a = TEAM_TLA[m.away];

  }
});

/* ============================================================
   NAVNE-ALIASER (fallback hvis TLA mangler)
   ============================================================ */
var ALIASES = {
  "korea republic": "south korea",
  "korea, republic of": "south korea",
  "republic of korea": "south korea",
  "korea rep.": "south korea",
  "czech republic": "czechia",
  "czech rep.": "czechia",
  "cape verde islands": "cape verde",
  "cape verde is.": "cape verde",
  "cabo verde": "cape verde",
  "curacao": "curacao",
  "cote d'ivoire": "ivory coast",
  "cote divoire": "ivory coast",
  "cote d ivoire": "ivory coast",
  "congo dr": "congo dr",
  "dr congo": "congo dr",
  "democratic republic of the congo": "congo dr",
  "usa": "united states",
  "united states of america": "united states",
  "bosnia & herzegovina": "bosnia and herzegovina",
  "bosnia-herzegovina": "bosnia and herzegovina",
  "turkiye": "turkey",
  "aotearoa new zealand": "new zealand",
  "kingdom of saudi arabia": "saudi arabia",
  "republic of south africa": "south africa"
};

/* ============================================================
   CORS-PROXYER (kun de som stotter custom headers)
   ============================================================ */
var PROXIES = [
  "https://corsproxy.io/?",
  "https://cors-proxy.fringe.zone/"
];

/* ============================================================
   TILSTAND
   ============================================================ */
var results = {};
var lastFetchTime = null;
var isFetching = false;
var fetchRetries = 0;
var MAX_RETRIES = 2;
var currentTab = "leaderboard";

/* ============================================================
   HJELPEFUNKSJONER
   ============================================================ */
function normalize(str) {
  if (!str) return "";
  return String(str).toLowerCase()
    .normalize("NFD").replace(/\p{Diacritic}/gu, "")
    .replace(/[^a-z0-9\s]/g, " ")
    .replace(/\s+/g, " ").trim();
}

function canonicalName(raw) {
  var n = normalize(raw);
  if (!n) return n;
  if (ALIASES[n]) return normalize(ALIASES[n]);
  return n;
}

function tokens(str) {
  if (!str) return [];
  return normalize(str).split(" ").filter(Boolean);
}

function tokenOverlap(a, b) {
  var ta = tokens(a), tb = tokens(b);
  if (ta.length === 0 || tb.length === 0) return 0;
  var inter = ta.filter(function(x) { return tb.indexOf(x) >= 0; }).length;
  return inter / Math.min(ta.length, tb.length);
}

function namesMatchAdvanced(localName, apiName) {
  if (!localName || !apiName) return false;
  var ln = canonicalName(localName);
  var an = canonicalName(apiName);
  if (!ln || !an) return false;
  if (ln === an) return true;
  if (ln.indexOf(an) >= 0 || an.indexOf(ln) >= 0) return true;
  if (tokenOverlap(ln, an) >= 0.5) return true;
  var cross = (tokenOverlap(localName, apiName) + tokenOverlap(apiName, localName)) / 2;
  if (cross >= 0.45) return true;
  return false;
}

function points(actual, tip) {
  if (!actual) return 0;
  if (actual === tip) return 4;
  try {
    var a = actual.split("-").map(Number);
    var t = tip.split("-").map(Number);
    if (a.length !== 2 || t.length !== 2) return 0;
    return Math.sign(a[0] - a[1]) === Math.sign(t[0] - t[1]) ? 2 : 0;
  } catch (e) { return 0; }
}

/* ============================================================
   FINN LOKAL KAMP FRA API-KAMP (TLA foerst, navn som fallback)
   ============================================================ */
function findLocalMatch(apiMatch) {
  var homeTla = (apiMatch.homeTeam && apiMatch.homeTeam.tla) ? apiMatch.homeTeam.tla.toUpperCase() : "";
  var awayTla = (apiMatch.awayTeam && apiMatch.awayTeam.tla) ? apiMatch.awayTeam.tla.toUpperCase() : "";

  // 1. TLA-oppslag (mest paalitelig)
  if (homeTla && awayTla) {
    var key = homeTla + "-" + awayTla;
    if (TLA_PAIR[key]) return TLA_PAIR[key];
  }

  // 2. Navnmatching (fallback)
  var rawHome = (apiMatch.homeTeam && (apiMatch.homeTeam.name || apiMatch.homeTeam.shortName)) || "";
  var rawAway = (apiMatch.awayTeam && (apiMatch.awayTeam.name || apiMatch.awayTeam.shortName)) || "";

  var found = MATCHES.find(function(m) {
    return namesMatchAdvanced(m.home, rawHome) && namesMatchAdvanced(m.away, rawAway);
  });
  if (!found) {
    found = MATCHES.find(function(m) {
      return namesMatchAdvanced(m.home, rawAway) && namesMatchAdvanced(m.away, rawHome);
    });
  }
  return found || null;
}

/* ============================================================
   UI-HJELPERE
   ============================================================ */
function setStatus(text, isError) {
  var el = document.getElementById("status");
  el.innerText = text;
  el.style.color = isError ? "#ff6b6b" : "#9fb0cc";
}

function showError(msg) {
  document.getElementById("errors").innerHTML = '<div class="error-box">' + msg + '</div>';
}

function clearErrors() {
  document.getElementById("errors").innerHTML = "";
}

/* ============================================================
   LOCALSTORAGE CACHE (viser sist kjente data umiddelbart)
   ============================================================ */
function saveCache() {
  try {
    localStorage.setItem("tippeliga_cache", JSON.stringify({
      results: results,
      time: lastFetchTime ? lastFetchTime.toISOString() : null
    }));
  } catch (e) { /* quota exceeded – ignorer */ }
}

function loadCache() {
  try {
    var raw = localStorage.getItem("tippeliga_cache");
    if (!raw) return false;
    var parsed = JSON.parse(raw);
    if (parsed.results) {
      results = parsed.results;
      lastFetchTime = parsed.time ? new Date(parsed.time) : null;
      return true;
    }
  } catch (e) { /* korrupt cache – ignorer */ }
  return false;
}

/* ============================================================
   DATAHENTING – PARALLELL PROXY-RACING
   Sender foresporselen til alle proxyer samtidig.
   Den foerste som svarer med gyldig JSON vinner.
   ============================================================ */
function tryProxy(proxyUrl, apiUrl) {
  return new Promise(function(resolve, reject) {
    var controller = new AbortController();
    var tid = setTimeout(function() { controller.abort(); }, 8000);

    fetch(proxyUrl + encodeURIComponent(apiUrl), {
      method: "GET",
      headers: { "X-Auth-Token": API_KEY },
      signal: controller.signal
    })
    .then(function(res) {
      clearTimeout(tid);
      if (!res.ok) { reject(new Error("HTTP " + res.status)); return; }
      return res.text();
    })
    .then(function(text) {
      if (!text) { reject(new Error("Tom respons")); return; }
      var trimmed = text.trim();
      if (trimmed.charAt(0) !== "{" && trimmed.charAt(0) !== "[") {
        reject(new Error("Ikke JSON")); return;
      }
      resolve(JSON.parse(trimmed));
    })
    .catch(function(e) {
      clearTimeout(tid);
      reject(e);
    });
  });
}

function fetchWithProxy(apiUrl) {
  var attempts = PROXIES.map(function(p) { return tryProxy(p, apiUrl); });

  // Promise.any: foerste vellykkede respons vinner
  if (typeof Promise.any === "function") {
    return Promise.any(attempts);
  }

  // Fallback for eldre nettlesere: proev sekvensielt
  return attempts.reduce(function(chain, attempt, i) {
    return chain.catch(function() { return tryProxy(PROXIES[i], apiUrl); });
  }, Promise.reject());
}

/* ============================================================
   HOVEDFUNKSJON: HENT LIVE DATA
   ============================================================ */
function fetchLive() {
  if (isFetching) return Promise.resolve();
  isFetching = true;
  document.getElementById("updateBtn").classList.add("loading");
  setStatus("Henter live data...");
  clearErrors();

  var apiUrl = "https://api.football-data.org/v4/competitions/" + COMPETITION_ID + "/matches?limit=500";

  return fetchWithProxy(apiUrl)
    .then(function(data) {
      if (!data || !Array.isArray(data.matches)) {
        throw new Error("Ugyldig API-respons");
      }

      var updated = {};
      for (var k in results) { if (results.hasOwnProperty(k)) updated[k] = results[k]; }

      var matchedCount = 0;
      var unmatchedApi = [];

      data.matches.forEach(function(match) {
        try {
          var fullHome = (match.score && match.score.fullTime) ? match.score.fullTime.home : null;
          var fullAway = (match.score && match.score.fullTime) ? match.score.fullTime.away : null;
          var isFinished = match.status === "FINISHED" || (fullHome !== null && fullHome !== undefined);
          var score = isFinished ? (fullHome + "-" + fullAway) : null;

          var rawHome = (match.homeTeam && (match.homeTeam.name || match.homeTeam.shortName)) || "";
          var rawAway = (match.awayTeam && (match.awayTeam.name || match.awayTeam.shortName)) || "";

          var localMatch = findLocalMatch(match);

          if (localMatch) {
            updated[localMatch.id] = {
              score: score,
              status: match.status,
              date: match.utcDate,
              homeName: rawHome,
              awayName: rawAway,
              apiId: match.id
            };
            if (score) matchedCount++;
          } else if (rawHome || rawAway) {
            unmatchedApi.push({
              home: rawHome,
              away: rawAway,
              tlaH: match.homeTeam ? match.homeTeam.tla : "?",
              tlaA: match.awayTeam ? match.awayTeam.tla : "?"
            });
          }
        } catch (e) {
          console.error("Feil ved prosessering av kamp:", e);
        }
      });

      results = updated;
      fetchRetries = 0;
      lastFetchTime = new Date();
      saveCache();
      render();

      setStatus("Oppdatert: " + lastFetchTime.toLocaleTimeString() + " (" + matchedCount + "/" + MATCHES.length + " ferdige)");

      if (unmatchedApi.length > 0) {
        console.log("API-kamper IKKE i tippelistens:", unmatchedApi);
      }

      // Logg kamper fra lista som IKKE ble funnet i API
      var missingLocal = MATCHES.filter(function(m) { return !updated[m.id]; });
      if (missingLocal.length > 0) {
        console.log("Tippekamper ikke funnet i API:", missingLocal.map(function(m) { return m.home + " vs " + m.away; }));
      }
    })
    .catch(function(error) {
      console.error("Fetch error:", error);
      if (fetchRetries < MAX_RETRIES) {
        fetchRetries++;
        setStatus("Forsok " + fetchRetries + "/" + MAX_RETRIES + "...", true);
        setTimeout(fetchLive, 3000 * fetchRetries);
      } else {
        showError("Kunne ikke hente data: " + error.message + ". Prov Oppdater-knappen om litt.");
        setStatus("Feil ved henting", true);
      }
    })
    .finally(function() {
      isFetching = false;
      document.getElementById("updateBtn").classList.remove("loading");
    });
}

/* ============================================================
   RENDERING
   ============================================================ */
function render() {
  if (currentTab === "leaderboard") renderLeaderboard();
  else renderMatches();
  updateMatchCount();
}

function renderLeaderboard() {
  var scores = PLAYERS.map(function(p, i) {
    var total = 0, details = [];
    MATCHES.forEach(function(m) {
      if (results[m.id] && results[m.id].score) {
        var pts = points(results[m.id].score, m.tips[i]);
        total += pts;
        details.push({ home: m.home, away: m.away, tip: m.tips[i], actual: results[m.id].score, points: pts });
      }
    });
    return { p: p, total: total, details: details };
  }).sort(function(a, b) { return b.total - a.total; });

  var app = document.getElementById("app");
  if (scores.every(function(s) { return s.total === 0; }) && Object.keys(results).length === 0) {
    app.innerHTML = '<div class="empty-state">Venter paa kamper...</div>';
    return;
  }

  var html = '<div class="card"><div class="row"><div style="font-weight:800">Live tippetabell</div><div class="small">Oppdatert: ' + (lastFetchTime ? lastFetchTime.toLocaleTimeString() : "\u2014") + '</div></div></div>';

  html += scores.map(function(s, idx) {
    var dHtml = "";
    if (s.details.length) {
      dHtml = s.details.map(function(d) {
        return '<div class="details-item"><div class="left">' + d.home + " vs " + d.away + '<div class="small">Tip: ' + d.tip + '</div></div><div class="right">' + (d.actual || "\u2013") + ' <span style="color:#7be2a4;font-weight:700">' + (d.actual ? ("+" + d.points) : "") + "</span></div></div>";
      }).join("");
    } else {
      dHtml = '<div class="small">Ingen ferdige kamper enda</div>';
    }
    return '<details class="player" ' + (idx < 3 ? "open" : "") + '><summary><div class="details-row"><div>' + (idx + 1) + '. <span class="player-name">' + s.p + '</span></div><div class="gold">' + s.total + " pts</div></div></summary>" + '<div class="details-list">' + dHtml + "</div></details>";
  }).join("");

  app.innerHTML = html;
}

function renderMatches() {
  var app = document.getElementById("app");
  var played = MATCHES.filter(function(m) { return results[m.id] && results[m.id].score; });
  var upcoming = MATCHES.filter(function(m) { return !results[m.id] || !results[m.id].score; });

  var html = '<div class="card"><div style="font-weight:800">Kamper</div><div class="small">Ferdigspilte kamper gruppert per dag. Kommende kamper vises under.</div></div>';

  if (played.length === 0) {
    html += '<div class="card"><div class="empty-state">Ingen kamper er ferdigspilt enda.</div></div>';
  } else {
    var byDay = {};
    played.forEach(function(m) {
      var r = results[m.id];
      var date = r.date ? new Date(r.date) : null;
      var dayStr = date ? date.toLocaleDateString("no-NO", { weekday: "short", day: "2-digit", month: "short" }) : "Ukjent dato";
      if (!byDay[dayStr]) byDay[dayStr] = [];
      byDay[dayStr].push({ match: m, res: r });
    });
    var dayKeys = Object.keys(byDay).sort(function(a, b) {
      return new Date(byDay[b][0].res.date) - new Date(byDay[a][0].res.date);
    });
    dayKeys.forEach(function(day) {
      var items = byDay[day];
      html += '<details class="matches-day" open><summary>' + day + " \u2014 " + items.length + " kamp(er)</summary><div style=\"margin-top:8px\">";
      items.forEach(function(it) {
        var m = it.match, r = it.res;
        html += '<div class="match-card"><div class="match-row"><div><strong>' + m.home + "</strong> vs <strong>" + m.away + '</strong></div><div class="match-score">' + r.score + '</div></div><div class="match-meta small">Status: ' + (r.status || "\u2014") + " \u2022 Spilt: " + (r.date ? new Date(r.date).toLocaleTimeString() : "\u2014") + '</div><div class="player-tips">' + m.tips.map(function(t, i) {
          return '<div class="tip-pill">' + PLAYERS[i] + ": " + t + (r.score ? (" \u2192 " + points(r.score, t) + "p") : "") + "</div>";
        }).join("") + "</div></div>";
      });
      html += "</div></details>";
    });
  }

  html += '<div class="card"><div style="font-weight:800">Kommende kamper</div><div class="small">Tips for kamper som ikke er spilt enda.</div></div>';
  if (upcoming.length === 0) {
    html += '<div class="card"><div class="empty-state">Ingen kommende kamper.</div></div>';
  } else {
    upcoming.forEach(function(m) {
      var dateInfo = "";
      if (results[m.id] && results[m.id].date) {
        var d = new Date(results[m.id].date);
        dateInfo = d.toLocaleDateString("no-NO", { day: "2-digit", month: "short" }) + " kl. " + d.toLocaleTimeString("no-NO", { hour: "2-digit", minute: "2-digit" });
      }
      html += '<div class="match-card"><div class="match-row"><div><strong>' + m.home + "</strong> vs <strong>" + m.away + '</strong></div><div class="match-meta small">' + (dateInfo || "Dato TBD") + '</div></div><div class="player-tips">' + m.tips.map(function(t, i) {
        return '<div class="tip-pill">' + PLAYERS[i] + ": " + t + "</div>";
      }).join("") + "</div></div>";
    });
  }

  app.innerHTML = html;
}

function updateMatchCount() {
  var n = MATCHES.filter(function(m) { return results[m.id] && results[m.id].score; }).length;
  document.getElementById("matchCount").innerText = n + " / " + MATCHES.length + " kamper oppdatert";
}

/* ============================================================
   FANER OG OPPDATERING
   ============================================================ */
function setTab(tab) {
  currentTab = tab;
  document.getElementById("tabLeaderboard").classList.toggle("active", tab === "leaderboard");
  document.getElementById("tabMatches").classList.toggle("active", tab === "matches");
  render();
}

function handleUpdate() {
  fetchRetries = 0;
  fetchLive();
}

/* ============================================================
   OPPSTART
   ============================================================ */
window.addEventListener("load", function() {
  console.log("Tippeliga Live starter...");
  console.log("TLA-par konfigurert:", Object.keys(TLA_PAIR).length / 2, "kamper");

  // Last inn cached data umiddelbart (instant render)
  if (loadCache()) {
    console.log("Cache lastet - viser sist kjente data");
    render();
    setStatus("Viser cachet data, henter fersk...");
  }

  // Hent fersk data i bakgrunnen
  fetchLive();
});

// Auto-oppdater hvert 5. minutt
setInterval(fetchLive, UPDATE_INTERVAL);

// Vis tid siden siste oppdatering
setInterval(function() {
  if (lastFetchTime && !isFetching) {
    var diff = Math.floor((Date.now() - lastFetchTime) / 1000);
    var min = Math.floor(diff / 60);
    var sec = diff % 60;
    var str = min > 0 ? (min + "m " + sec + "s siden") : (sec + "s siden");
    document.getElementById("status").innerText = "Sist oppdatert: " + str;
  }
}, 1000);
</script>
