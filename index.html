<html lang="no">

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
/* ── RESET & BASE ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  background: #060b16;
  color: #ddeeff;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── HEADER ───────────────────────────────────── */
.header {
  background: linear-gradient(180deg, #0c1928 0%, #080f1c 100%);
  border-bottom: 1px solid #0f2030;
  position: sticky; top: 0; z-index: 20;
  padding: 12px 16px 0;
  text-align: center;
}
.title {
  font-size: 16px; font-weight: 900;
  letter-spacing: 2px; color: #e8f4ff;
  text-transform: uppercase;
}
.status-bar {
  font-size: 11px; color: #6a8caa;
  margin: 6px 0 4px;
  min-height: 16px;
}
.controls {
  display: flex; justify-content: center; align-items: center;
  gap: 10px; margin-bottom: 10px;
}
.btn-refresh {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 14px;
  background: transparent;
  border: 1px solid #1a3a55;
  color: #aaccee;
  border-radius: 20px;
  cursor: pointer; font-size: 13px; font-weight: 600;
  transition: background 150ms, border-color 150ms;
  min-height: 36px;
}
.btn-refresh:hover { background: #0f2a3c; border-color: #2a5a80; }
.btn-refresh.loading { opacity: 0.5; pointer-events: none; }
.match-count-badge {
  font-size: 11px; color: #4a7a9a;
  background: #0a1a28;
  border: 1px solid #0f2a3a;
  border-radius: 20px;
  padding: 4px 10px;
}
.tabs {
  display: flex; justify-content: center; gap: 6px;
  padding: 0 12px 10px;
}
.tab {
  padding: 7px 16px;
  border-radius: 20px;
  font-size: 13px; font-weight: 600;
  color: #6a8caa;
  cursor: pointer;
  border: 1px solid transparent;
  background: transparent;
  transition: all 150ms;
  min-height: 36px;
  display: flex; align-items: center;
}
.tab:hover { color: #aaccee; background: #0a1825; }
.tab.active {
  background: linear-gradient(135deg, #12304a, #1a4a6e);
  color: #e0f0ff;
  border-color: #1e4a6a;
  box-shadow: 0 2px 12px rgba(20,70,110,0.5);
}

/* ── LAYOUT ───────────────────────────────────── */
.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 10px 12px 80px;
}

/* ── SECTION HEADERS ─────────────────────────── */
.section-header {
  background: #081020;
  border: 1px solid #0e2030;
  border-radius: 12px;
  padding: 12px 14px;
  margin: 8px 0 4px;
  display: flex; justify-content: space-between; align-items: center;
}
.section-title { font-weight: 800; font-size: 14px; color: #c8e0f8; }
.section-sub { font-size: 11px; color: #4a7a9a; }

.subsection-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  color: #3a6080;
  padding: 10px 4px 4px;
}

/* ── ERROR BOX ───────────────────────────────── */
.error-box {
  background: #2a1010; border: 1px solid #6a2020;
  color: #ff8888; border-radius: 10px;
  padding: 12px 14px; font-size: 13px; margin: 8px 0;
}
.empty-state {
  text-align: center; padding: 32px 20px;
  color: #4a6a88; font-size: 14px;
}

/* ── LEADERBOARD ─────────────────────────────── */
details.player {
  background: #07101e;
  border: 1px solid #0d1e2e;
  border-radius: 12px;
  margin: 6px 0;
  overflow: hidden;
  transition: border-color 200ms;
}
details.player[open] { border-color: #1a3a55; }
details.player summary {
  list-style: none;
  cursor: pointer;
  padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
  min-height: 52px;
  user-select: none;
  -webkit-user-select: none;
}
details.player summary::-webkit-details-marker { display: none; }
.player-rank { font-size: 18px; width: 28px; text-align: center; flex-shrink: 0; }
.player-info { flex: 1; min-width: 0; }
.player-name { font-weight: 800; font-size: 15px; color: #ddeeff; }
.player-stats-mini { font-size: 11px; color: #4a7a9a; margin-top: 2px; }
.player-score { font-size: 22px; font-weight: 900; color: #f0c040; flex-shrink: 0; }
.player-score .pts-label { font-size: 13px; color: #a08020; font-weight: 600; }
.chevron {
  width: 20px; height: 20px; flex-shrink: 0;
  color: #3a6a8a;
  transition: transform 200ms;
}
details.player[open] .chevron { transform: rotate(90deg); color: #6ab0e0; }
.player-details-inner { padding: 0 14px 12px; }
.detail-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 10px;
  border-radius: 8px;
  background: #060e1a;
  margin-bottom: 4px;
}
.detail-row:last-child { margin-bottom: 0; }
.detail-match { font-size: 13px; color: #c8ddf0; flex: 1; min-width: 0; }
.detail-match-sub { font-size: 11px; color: #4a7a9a; margin-top: 2px; }
.detail-result { font-size: 14px; font-weight: 800; color: #c8ddf0; flex-shrink: 0; margin-left: 10px; }
.pts-chip {
  display: inline-block;
  font-size: 11px; font-weight: 700;
  padding: 2px 7px; border-radius: 10px;
  margin-left: 6px;
}
.pts-4 { background: #0d3020; color: #7be2a4; }
.pts-2 { background: #2a2810; color: #d8d060; }
.pts-0 { background: #2a1010; color: #e07070; }

/* ── DAY GROUP DROPDOWNS ─────────────────────── */
details.day-group {
  background: #07101e;
  border: 1px solid #0d1e2e;
  border-radius: 12px;
  margin: 6px 0;
  overflow: hidden;
}
details.day-group[open] { border-color: #1a3050; }
details.day-group summary {
  list-style: none;
  cursor: pointer;
  padding: 12px 14px;
  display: flex; align-items: center; gap: 8px;
  min-height: 48px;
  user-select: none;
  -webkit-user-select: none;
  font-weight: 700; font-size: 14px; color: #b0ccee;
}
details.day-group summary::-webkit-details-marker { display: none; }
details.day-group[open] summary { color: #d8eeff; }
.day-chevron {
  width: 16px; height: 16px;
  flex-shrink: 0; margin-left: 4px;
  color: #3a6a8a;
  transition: transform 200ms;
}
details.day-group[open] .day-chevron { transform: rotate(90deg); color: #6ab0e0; }
.day-count {
  margin-left: auto;
  font-size: 11px; font-weight: 600;
  color: #3a6a8a;
  background: #0a1828;
  border: 1px solid #0f2538;
  border-radius: 10px;
  padding: 2px 8px;
  flex-shrink: 0;
}
.day-inner { padding: 4px 10px 10px; }

/* ── MATCH CARD (med resultat) ───────────────── */
.match-card {
  background: #060d1a;
  border: 1px solid #0c1c2c;
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 6px;
}
.match-card:last-child { margin-bottom: 0; }
.match-teams-row {
  display: flex; align-items: center; gap: 6px;
}
.team-name {
  font-size: 14px; font-weight: 700; color: #c8ddf0;
  flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.match-score-display {
  font-size: 18px; font-weight: 900;
  color: #70c0ff;
  background: #0a1e30;
  border: 1px solid #0f2a40;
  border-radius: 8px;
  padding: 3px 10px;
  flex-shrink: 0;
  letter-spacing: 1px;
}
.match-meta-row {
  display: flex; align-items: center; gap: 8px;
  margin-top: 7px; flex-wrap: wrap;
}
.match-time { font-size: 11px; color: #4a7a9a; }
.live-badge {
  display: inline-flex; align-items: center;
  background: #0d3020; color: #50e090;
  font-size: 10px; font-weight: 800;
  padding: 2px 8px; border-radius: 10px;
  border: 1px solid #1a6040;
  animation: pulse 1.4s ease-in-out infinite;
  letter-spacing: 1px;
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
.tips-row {
  display: flex; flex-wrap: wrap; gap: 5px;
  margin-top: 8px;
}
.tip-pill {
  display: inline-flex; align-items: center; gap: 4px;
  background: #0a1828;
  border: 1px solid #102030;
  border-radius: 20px;
  padding: 4px 9px;
  font-size: 12px; color: #8aaccc;
  white-space: nowrap;
}
.tip-pill .tip-name { color: #6a8caa; font-weight: 600; }
.tip-pill .tip-score { color: #c8ddf0; font-weight: 700; }
.tip-pill .tip-pts { font-size: 11px; font-weight: 700; }

/* ── UPCOMING CARD (uten resultat) ──────────── */
.upcoming-card {
  background: #060d1a;
  border: 1px solid #0c1c2c;
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 6px;
}
.upcoming-card:last-child { margin-bottom: 0; }
.upcoming-teams {
  display: flex; align-items: center; gap: 8px;
}
.upcoming-team {
  font-size: 14px; font-weight: 700; color: #90aacc;
  flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── MOBIL ───────────────────────────────────── */
@media (max-width: 480px) {
  .title { font-size: 13px; letter-spacing: 1px; }
  .container { padding: 8px 8px 80px; }
  .team-name { font-size: 13px; }
  .match-score-display { font-size: 16px; padding: 3px 8px; }
  .tip-pill { font-size: 11px; padding: 3px 7px; }
  .player-score { font-size: 20px; }
  .tabs { gap: 4px; }
  .tab { padding: 6px 12px; font-size: 12px; }
}

/* ============================================================
   TLA-PAR OPPSLAG
   ============================================================ */
var TLA_PAIR = {};
MATCHES.forEach(function(m) {
  if (m.tlaH && m.tlaA) {
    TLA_PAIR[m.tlaH + "-" + m.tlaA] = m;
    TLA_PAIR[m.tlaA + "-" + m.tlaH] = m;
  }
});

/* ============================================================
   TILSTAND
   ============================================================ */
var results       = {};
var lastFetchTime = null;
var isFetching    = false;
var fetchRetries  = 0;
var MAX_RETRIES   = 2;
var currentTab    = "leaderboard";

/* ============================================================
   POENGBEREGNING
   ============================================================ */
function points(actual, tip) {
  if (!actual) return 0;
  if (actual === tip) return 4;
  try {
    var a = actual.split("-").map(Number);
    var t = tip.split("-").map(Number);
    if (a.length !== 2 || t.length !== 2) return 0;
    return Math.sign(a[0] - a[1]) === Math.sign(t[0] - t[1]) ? 2 : 0;
  } catch(e) { return 0; }
}

/* ============================================================
   TLA-MATCHING
   ============================================================ */
function findLocalMatch(apiMatch) {
  var hTla = (apiMatch.homeTeam && apiMatch.homeTeam.tla) ? apiMatch.homeTeam.tla.toUpperCase() : "";
  var aTla = (apiMatch.awayTeam && apiMatch.awayTeam.tla) ? apiMatch.awayTeam.tla.toUpperCase() : "";
  if (hTla && aTla) {
    var key = hTla + "-" + aTla;
    if (TLA_PAIR[key]) return TLA_PAIR[key];
  }
  return null;
}

/* ============================================================
   UI-HJELPERE
   ============================================================ */
function setStatus(text, isError) {
  var el = document.getElementById("status");
  el.innerText = text;
  el.style.color = isError ? "#ff6666" : "#6a8caa";
}
function showError(msg) {
  document.getElementById("errors").innerHTML = '<div class="error-box">' + msg + "</div>";
}
function clearErrors() {
  document.getElementById("errors").innerHTML = "";
}
function fmtDate(iso) {
  if (!iso) return "";
  var d = new Date(iso);
  return d.toLocaleDateString("no-NO", { weekday:"short", day:"2-digit", month:"short" })
       + "\u00a0kl.\u00a0" + d.toLocaleTimeString("no-NO", { hour:"2-digit", minute:"2-digit" });
}
function fmtDayKey(iso) {
  if (!iso) return "9999-99-99";
  return iso.substring(0, 10);
}
function fmtDayLabel(iso) {
  if (!iso) return "Ukjent dato";
  var d = new Date(iso);
  return d.toLocaleDateString("no-NO", { weekday:"long", day:"2-digit", month:"long" });
}
function statusLabel(s) {
  if (s === "FINISHED")  return "Ferdig";
  if (s === "IN_PLAY")   return '<span class="live-badge">&#9679;\u00a0LIVE</span>';
  if (s === "PAUSED")    return '<span class="live-badge">&#9679;\u00a0Pause</span>';
  if (s === "TIMED" || s === "SCHEDULED") return "Kommende";
  if (s === "POSTPONED") return "Utsatt";
  return s || "";
}
function isLiveOrPaused(s) { return s === "IN_PLAY" || s === "PAUSED"; }

/* CHEVRON SVG */
var CHEVRON = '<svg class="day-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>';

/* ============================================================
   CACHE
   ============================================================ */
var CACHE_KEY = "tippeliga_" + CACHE_VERSION;
function saveCache() {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      results: results,
      time: lastFetchTime ? lastFetchTime.toISOString() : null
    }));
  } catch(e) {}
}
function loadCache() {
  try {
    for (var i = localStorage.length - 1; i >= 0; i--) {
      var k = localStorage.key(i);
      if (k && k.indexOf("tippeliga_") === 0 && k !== CACHE_KEY) localStorage.removeItem(k);
    }
    var raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return false;
    var p = JSON.parse(raw);
    if (p.results) {
      results = p.results;
      lastFetchTime = p.time ? new Date(p.time) : null;
      return true;
    }
  } catch(e) {}
  return false;
}

/* ============================================================
   DATAHENTING
   ============================================================ */
function tryFetch(url, options, timeout) {
  return new Promise(function(resolve, reject) {
    var ctrl = new AbortController();
    var tid  = setTimeout(function() { ctrl.abort(); }, timeout);
    options.signal = ctrl.signal;
    fetch(url, options)
      .then(function(res) {
        clearTimeout(tid);
        if (!res.ok) { reject(new Error("HTTP " + res.status)); return; }
        return res.text();
      })
      .then(function(text) {
        if (!text) { reject(new Error("Tom respons")); return; }
        var t = text.trim();
        if (t[0] !== "{" && t[0] !== "[") { reject(new Error("Ikke JSON")); return; }
        resolve(JSON.parse(t));
      })
      .catch(function(e) { clearTimeout(tid); reject(e); });
  });
}
function fetchData(apiUrl) {
  var hdrs = { "X-Auth-Token": API_KEY };
  var p1 = tryFetch("https://corsproxy.io/?" + encodeURIComponent(apiUrl), { method:"GET", headers:hdrs }, 10000);
  var apiWithKey = apiUrl + (apiUrl.indexOf("?") >= 0 ? "&" : "?") + "X-Auth-Token=" + API_KEY;
  var p2 = tryFetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(apiWithKey), { method:"GET" }, 12000);
  if (typeof Promise.any === "function") return Promise.any([p1, p2]);
  return p1.catch(function() { return p2; });
}

/* ============================================================
   HOVED-FETCH
   ============================================================ */
function fetchLive() {
  if (isFetching) return Promise.resolve();
  isFetching = true;
  document.getElementById("updateBtn").classList.add("loading");
  setStatus("Henter live data...");
  clearErrors();

  var apiUrl = "https://api.football-data.org/v4/competitions/" + COMPETITION_ID + "/matches?limit=500";

  return fetchData(apiUrl)
    .then(function(data) {
      if (!data || !Array.isArray(data.matches)) throw new Error("Ugyldig API-respons");

      var updated = {};
      for (var k in results) { if (results.hasOwnProperty(k)) updated[k] = results[k]; }
      var nFinished = 0, nMatched = 0;

      data.matches.forEach(function(match) {
        var rawHome = (match.homeTeam && (match.homeTeam.name || match.homeTeam.shortName)) || "?";
        var rawAway = (match.awayTeam && (match.awayTeam.name || match.awayTeam.shortName)) || "?";
        var fH = (match.score && match.score.fullTime) ? match.score.fullTime.home : null;
        var fA = (match.score && match.score.fullTime) ? match.score.fullTime.away : null;
        var hasScore = fH !== null && fH !== undefined && fA !== null && fA !== undefined;
        var score = hasScore ? (fH + "-" + fA) : null;
        var lm = findLocalMatch(match);
        if (lm) {
          nMatched++;
          updated[lm.id] = { score:score, status:match.status, date:match.utcDate, homeName:rawHome, awayName:rawAway };
          if (score) nFinished++;
        }
      });

      results = updated;
      fetchRetries = 0;
      lastFetchTime = new Date();
      saveCache();
      render();
      setStatus("Oppdatert\u00a0" + lastFetchTime.toLocaleTimeString() + "\u00a0\u2022\u00a0" + nFinished + "/" + MATCHES.length + " ferdige");
    })
    .catch(function(error) {
      console.error("Fetch feilet:", error);
      if (fetchRetries < MAX_RETRIES) {
        fetchRetries++;
        setStatus("Forsøk " + fetchRetries + "/" + MAX_RETRIES + "...", true);
        setTimeout(fetchLive, 3000 * fetchRetries);
      } else {
        showError("Kunne ikke hente data: " + error.message);
        setStatus("Feil ved henting", true);
      }
    })
    .finally(function() {
      isFetching = false;
      document.getElementById("updateBtn").classList.remove("loading");
    });
}

/* ============================================================
   RENDERING
   ============================================================ */
function render() {
  if (currentTab === "leaderboard") renderLeaderboard();
  else renderMatches();
  updateMatchCount();
}

/* ── LEADERBOARD ── */
function renderLeaderboard() {
  var scores = PLAYERS.map(function(p, i) {
    var total = 0, exact = 0, correct = 0, wrong = 0, details = [];
    MATCHES.forEach(function(m) {
      if (results[m.id] && results[m.id].score) {
        var pts = points(results[m.id].score, m.tips[i]);
        total += pts;
        if      (pts === 4) exact++;
        else if (pts === 2) correct++;
        else                wrong++;
        details.push({ home:m.home, away:m.away, tip:m.tips[i], actual:results[m.id].score, pts:pts });
      }
    });
    return { name:p, total:total, exact:exact, correct:correct, wrong:wrong, details:details };
  }).sort(function(a, b) { return b.total - a.total; });

  var app = document.getElementById("app");
  if (!scores.some(function(s) { return s.total > 0; }) && Object.keys(results).length === 0) {
    app.innerHTML = '<div class="empty-state">Venter på data fra API...</div>';
    return;
  }

  var played = scores[0] ? scores[0].details.length : 0;
  var html = '<div class="section-header">'
           + '<span class="section-title">Tippetabell</span>'
           + '<span class="section-sub">' + played + ' kamper bedømt</span>'
           + '</div>';

  html += scores.map(function(s, idx) {
    var ptsChip = function(pts) {
      var cls = pts === 4 ? "pts-4" : pts === 2 ? "pts-2" : "pts-0";
      return '<span class="pts-chip ' + cls + '">+' + pts + 'p</span>';
    };
    var dHtml = s.details.length
      ? s.details.map(function(d) {
          return '<div class="detail-row">'
               + '<div class="detail-match">' + d.home + ' vs ' + d.away
               + '<div class="detail-match-sub">Tip: ' + d.tip + '</div></div>'
               + '<div class="detail-result">' + d.actual + ptsChip(d.pts) + '</div>'
               + '</div>';
        }).join("")
      : '<div style="padding:8px 0;font-size:13px;color:#4a6a88">Ingen ferdige kamper enda</div>';

    return '<details class="player">'
         + '<summary>'
         + '<div class="player-rank">' + RANK_ICON[idx] + '</div>'
         + '<div class="player-info">'
         +   '<div class="player-name">' + s.name + '</div>'
         +   '<div class="player-stats-mini">' + s.exact + ' eksakte\u00a0\u00b7\u00a0' + s.correct + ' riktig utfall\u00a0\u00b7\u00a0' + s.wrong + ' feil</div>'
         + '</div>'
         + '<div class="player-score">' + s.total + '<span class="pts-label">\u00a0p</span></div>'
         + '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>'
         + '</summary>'
         + '<div class="player-details-inner">' + dHtml + '</div>'
         + '</details>';
  }).join("");

  app.innerHTML = html;
}

/* ── MATCH CARD (med resultat) ── */
function renderMatchCard(m, r) {
  var ptsChip = function(pts) {
    var cls = pts === 4 ? "pts-4" : pts === 2 ? "pts-2" : "pts-0";
    return '<span class="tip-pts ' + cls + '">' + pts + 'p</span>';
  };
  var scoreHtml = r.score
    ? '<div class="match-score-display">' + r.score + '</div>'
    : '<span style="font-size:11px;color:#2a5070;font-weight:700">vs</span>';

  var tipsHtml = '<div class="tips-row">'
    + m.tips.map(function(t, i) {
        var pts = r.score ? points(r.score, t) : null;
        var chip = (pts !== null) ? ptsChip(pts) : "";
        return '<div class="tip-pill"><span class="tip-name">' + PLAYERS[i] + '</span>'
             + '<span class="tip-score">' + t + '</span>' + chip + '</div>';
      }).join("")
    + '</div>';

  return '<div class="match-card">'
       + '<div class="match-teams-row">'
       + '<div class="team-name">' + m.home + '</div>'
       + scoreHtml
       + '<div class="team-name" style="text-align:right">' + m.away + '</div>'
       + '</div>'
       + '<div class="match-meta-row">'
       + '<span class="match-time">' + fmtDate(r.date) + '</span>'
       + '<span>' + statusLabel(r.status) + '</span>'
       + '</div>'
       + tipsHtml
       + '</div>';
}

/* ── UPCOMING CARD (uten resultat) ── */
function renderUpcomingCard(m, r) {
  var dateStr = (r && r.date) ? fmtDate(r.date) : "Dato TBD";
  return '<div class="upcoming-card">'
       + '<div class="upcoming-teams">'
       + '<div class="upcoming-team">' + m.home + '</div>'
       + '<span style="font-size:11px;color:#2a5070;font-weight:700;flex-shrink:0">vs</span>'
       + '<div class="upcoming-team" style="text-align:right">' + m.away + '</div>'
       + '</div>'
       + '<div class="match-meta-row" style="margin-top:6px">'
       + '<span class="match-time">' + dateStr + '</span>'
       + '</div>'
       + '<div class="tips-row">'
       + m.tips.map(function(t, i) {
           return '<div class="tip-pill"><span class="tip-name">' + PLAYERS[i] + '</span>'
                + '<span class="tip-score">' + t + '</span></div>';
         }).join("")
       + '</div>'
       + '</div>';
}

/* ── DAY GROUP HTML ── */
function renderDayGroup(label, items, isOpen, renderFn) {
  var html = '<details class="day-group"' + (isOpen ? " open" : "") + '>'
           + '<summary>' + label
           + '<span class="day-count">' + items.length + ' kamper</span>'
           + CHEVRON
           + '</summary>'
           + '<div class="day-inner">';
  items.forEach(function(it) { html += renderFn(it.match, it.res); });
  html += '</div></details>';
  return html;
}

/* ── KAMPER & TIPS ── */
function renderMatches() {
  var app = document.getElementById("app");

  var live = MATCHES.filter(function(m) {
    return results[m.id] && isLiveOrPaused(results[m.id].status);
  });
  var finished = MATCHES.filter(function(m) {
    return results[m.id] && results[m.id].score && !isLiveOrPaused(results[m.id].status);
  });
  var upcoming = MATCHES.filter(function(m) {
    return !results[m.id] || (!results[m.id].score && !isLiveOrPaused(results[m.id].status));
  });

  var totalPlayed = live.length + finished.length;
  var html = '<div class="section-header">'
           + '<span class="section-title">Alle ' + MATCHES.length + ' kamper</span>'
           + '<span class="section-sub">' + totalPlayed + ' spilt\u00a0\u00b7\u00a0' + upcoming.length + ' gjenstår</span>'
           + '</div>';

  /* ── 1. LIVE (alltid øverst, ingen dropdown) ── */
  live.forEach(function(m) { html += renderMatchCard(m, results[m.id]); });

  /* ── 2. KOMMENDE – per dag, kronologisk, første dag åpen ── */
  if (upcoming.length > 0) {
    html += '<div class="subsection-label">Kommende kamper</div>';

    var upByDay = {};
    upcoming.forEach(function(m) {
      var r   = results[m.id];
      var key = (r && r.date) ? fmtDayKey(r.date) : "9999-99-99";
      var lbl = (r && r.date) ? fmtDayLabel(r.date) : "Dato TBD";
      if (!upByDay[key]) upByDay[key] = { label:lbl, items:[] };
      upByDay[key].items.push({ match:m, res:r });
    });

    /* Kronologisk: tidligste dag øverst */
    var upKeys = Object.keys(upByDay).sort();

    upKeys.forEach(function(key, idx) {
      var group = upByDay[key];
      /* Sorter kamper innen dagen kronologisk */
      group.items.sort(function(a, b) {
        var da = (a.res && a.res.date) ? new Date(a.res.date) : new Date("9999-01-01");
        var db = (b.res && b.res.date) ? new Date(b.res.date) : new Date("9999-01-01");
        return da - db;
      });
      /* Første (neste) dag åpen, resten lukket */
      html += renderDayGroup(group.label, group.items, idx === 0, renderUpcomingCard);
    });
  }

  /* ── 3. FERDIGSPILTE – per dag, nyeste øverst, alle lukket ── */
  if (finished.length > 0) {
    html += '<div class="subsection-label">Ferdigspilte kamper</div>';

    var finByDay = {};
    finished.forEach(function(m) {
      var r   = results[m.id];
      var key = fmtDayKey(r.date);
      var lbl = fmtDayLabel(r.date);
      if (!finByDay[key]) finByDay[key] = { label:lbl, items:[] };
      finByDay[key].items.push({ match:m, res:r });
    });

    /* Nyeste dag øverst */
    var finKeys = Object.keys(finByDay).sort(function(a, b) { return b > a ? 1 : b < a ? -1 : 0; });

    finKeys.forEach(function(key) {
      var group = finByDay[key];
      /* Nyeste kamp øverst innen dagen */
      group.items.sort(function(a, b) { return new Date(b.res.date) - new Date(a.res.date); });
      /* Alle lukket */
      html += renderDayGroup(group.label, group.items, false, function(m, r) { return renderMatchCard(m, r); });
    });
  }

  if (live.length === 0 && finished.length === 0 && upcoming.length === 0) {
    html += '<div class="empty-state">Ingen kampdata tilgjengelig enda.</div>';
  }

  app.innerHTML = html;
}

function updateMatchCount() {
  var n = MATCHES.filter(function(m) { return results[m.id] && results[m.id].score; }).length;
  document.getElementById("matchCount").innerText = n + "\u00a0/\u00a0" + MATCHES.length;
}

  document.getElementById("tabMatches").classList.toggle("active", tab === "matches");

setInterval(function() {
  if (lastFetchTime && !isFetching) {
    var diff = Math.floor((Date.now() - lastFetchTime) / 1000);
    var min  = Math.floor(diff / 60);
    var sec  = diff % 60;
    document.getElementById("status").innerText =
      "Oppdatert\u00a0" + (min > 0 ? min + "m\u00a0" : "") + sec + "s\u00a0siden";
  }
}, 1000);
