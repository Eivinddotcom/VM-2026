/* Leaderboard details */
details.player { background:#061123; border:1px solid #0e2230; padding:8px; border-radius:8px; margin:8px 0; }
details.player summary{ display:flex; justify-content:space-between; align-items:center; list-style:none; cursor:pointer; padding:6px 8px; }
details.player summary::before { content: "\25B8"; display:inline-block; transform:rotate(0deg); margin-right:8px; transition: transform 150ms ease; color:#9fb0cc; }
details.player[open] summary::before { transform:rotate(90deg); color:#f0c95d; }
.details-row { display:flex; justify-content:space-between; gap:12px; }
.details-list { margin-top:8px; }
.details-item { display:flex; justify-content:space-between; padding:8px; border-radius:6px; background:#071523; margin-bottom:6px; align-items:center; }
.details-item .left { font-size:14px; }
.details-item .right { font-weight:700; }
/* Mobile-first adjustments */
@media (max-width:700px){
  .container { padding:0 10px 80px; }

  .match-row { font-size:13px; }
  .player-tips { gap:6px; }
}
</style>

<script>
/* ===== KONFIGURASJON ===== */
const API_KEY = "532ab6db012744d0912eedbd40c4764d";
const COMPETITION_ID = 'WC';
const UPDATE_INTERVAL = 300000; // 5 minutter (i millisekunder)

/* ===== SPILLERE OG TIPS ===== */
const PLAYERS = ["Staals","Kong","Dox","Jojo","Marko","Barra"];
const MATCHES = [
  {id:1, home:"Mexico", away:"South Africa", tips:["3-0","2-1","2-0","3-1","2-1","3-0"]},
  {id:2, home:"South Korea", away:"Czechia", tips:["2-1","1-1","1-1","2-3","1-0","1-2"]},
  {id:3, home:"Canada", away:"Bosnia and Herzegovina", tips:["1-1","0-1","2-1","2-0","1-1","2-0"]},
  {id:4, home:"United States", away:"Paraguay", tips:["2-1","1-1","0-0","2-3","3-0","2-1"]},
  {id:5, home:"Qatar", away:"Switzerland", tips:["0-3","0-3","0-1","1-3","0-2","0-3"]},
  {id:6, home:"Brazil", away:"Morocco", tips:["2-2","1-1","3-1","2-2","2-1","2-1"]},
  {id:7, home:"Haiti", away:"Scotland", tips:["0-3","0-0","0-3","0-2","0-3","0-2"]},
  {id:8, home:"Australia", away:"Turkey", tips:["0-1","0-2","1-3","0-2","1-2","0-2"]},
  {id:9, home:"Germany", away:"Curaçao", tips:["6-0","3-0","5-0","4-0","4-0","3-0"]},
  {id:10, home:"Netherlands", away:"Japan", tips:["1-1","2-1","1-2","1-2","1-1","3-1"]},
  {id:11, home:"Ivory Coast", away:"Ecuador", tips:["1-2","1-0","1-1","0-3","3-3","1-2"]},
  {id:12, home:"Sweden", away:"Tunisia", tips:["2-1","1-1","1-1","2-2","1-1","1-0"]},
  {id:13, home:"Spain", away:"Cape Verde", tips:["3-0","3-0","3-0","5-0","3-0","3-0"]},
  {id:14, home:"Belgium", away:"Egypt", tips:["2-2","2-0","1-0","2-1","2-1","2-0"]},
  {id:15, home:"Saudi Arabia", away:"Uruguay", tips:["0-2","0-2","0-3","0-3","2-2","0-1"]},
  {id:16, home:"Iran", away:"New Zealand", tips:["2-0","1-1","0-0","2-1","1-1","1-0"]},
  {id:17, home:"France", away:"Senegal", tips:["2-2","3-1","2-1","2-1","3-1","2-0"]},
  {id:18, home:"Iraq", away:"Norway", tips:["1-2","1-3","1-1","1-3","1-4","1-2"]},
  {id:19, home:"Argentina", away:"Algeria", tips:["3-1","2-0","2-0","2-0","2-1","3-1"]},
  {id:20, home:"Austria", away:"Jordan", tips:["2-2","1-0","2-1","2-0","3-0","2-0"]}
];

/* ===== NAVNE-ALIASER (API-navn -> lokalt navn) ===== */
const ALIASES = {
  'korea republic': 'south korea',
  'korea, republic of': 'south korea',
  'republic of korea': 'south korea',
  'czech republic': 'czechia',
  'cape verde islands': 'cape verde',
  'cape verde is.': 'cape verde',
  'curacao': 'curaçao',
  "cote d'ivoire": 'ivory coast',
  'cote divoire': 'ivory coast',
  'cote d ivoire': 'ivory coast',
  'ivory coast': 'ivory coast',
  'congo dr': 'congo dr',
  'dr congo': 'congo dr',
  'democratic republic of the congo': 'congo dr',
  'usa': 'united states',
  'united states of america': 'united states',
  'bosnia & herzegovina': 'bosnia and herzegovina',
  'bosnia-herzegovina': 'bosnia and herzegovina',
  'türkiye': 'turkey',
  'turkiye': 'turkey',
  'aotearoa new zealand': 'new zealand',
  'kingdom of saudi arabia': 'saudi arabia',
  'panama': 'panama'
};

/* ===== CORS-PROXYER MED FALLBACK ===== */
const PROXIES = [
  { url: "https://api.allorigins.win/raw?url=", passHeaders: false },
  { url: "https://corsproxy.io/?", passHeaders: true },
  { url: "https://cors-proxy.fringe.zone/", passHeaders: true }
];

/* ===== TILSTAND ===== */
let results = {};
let lastFetchTime = null;
let isFetching = false;
let fetchRetries = 0;
const MAX_RETRIES = 3;
let currentTab = 'leaderboard';

/* ===== HJELPEFUNKSJONER FOR NAVNEMATCHING ===== */
function normalize(str) {
  if (!str) return '';
  return String(str).toLowerCase()
    .normalize('NFD').replace(/\p{Diacritic}/gu, '')
    .replace(/[^a-z0-9\s]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function canonicalName(raw) {
  const n = normalize(raw);
  if (!n) return n;
  if (ALIASES[n]) return normalize(ALIASES[n]);
  return n;
}

function tokens(str) {
  if (!str) return [];
  return normalize(str).split(' ').filter(Boolean);
}

function tokenOverlap(a, b) {
  const ta = tokens(a), tb = tokens(b);
  if (ta.length === 0 || tb.length === 0) return 0;
  const inter = ta.filter(x => tb.includes(x)).length;
  return inter / Math.min(ta.length, tb.length);
}

function namesMatchAdvanced(localName, apiName) {
  if (!localName || !apiName) return false;
  const ln = canonicalName(localName);
  const an = canonicalName(apiName);
  if (!ln || !an) return false;
  if (ln === an) return true;
  if (ln.includes(an) || an.includes(ln)) return true;
  const overlap = tokenOverlap(ln, an);
  if (overlap >= 0.5) return true;
  // FIX: bruk reverserte argumenter for cross-overlap
  const cross = (tokenOverlap(localName, apiName) + tokenOverlap(apiName, localName)) / 2;
  if (cross >= 0.45) return true;
  return false;
}

/* ===== POENGBEREGNING ===== */
function points(actual, tip) {
  if (!actual) return 0;
  if (actual === tip) return 4; // riktig resultat
  try {
    const a = actual.split('-').map(Number);
    const t = tip.split('-').map(Number);
    if (a.length !== 2 || t.length !== 2) return 0;
    const ra = Math.sign(a[0] - a[1]);
    const rt = Math.sign(t[0] - t[1]);
    return ra === rt ? 2 : 0; // riktig utfall (H/U/B)
  } catch (e) { return 0; }
}

/* ===== UI-HJELPERE ===== */
function setStatus(text, isError = false) {
  const el = document.getElementById('status');
  el.innerText = text;
  el.style.color = isError ? '#ff6b6b' : '#9fb0cc';
}

function showError(msg) {
  document.getElementById('errors').innerHTML = '<div class="error-box">' + msg + '</div>';
}

function clearErrors() {
  document.getElementById('errors').innerHTML = '';
}

/* ===== DATAHENTING MED PROXY-FALLBACK ===== */
async function fetchWithProxy(apiUrl) {
  for (let i = 0; i < PROXIES.length; i++) {
    const proxy = PROXIES[i];
    try {
      console.log('Prover proxy ' + (i + 1) + '/' + PROXIES.length + ': ' + proxy.url.substring(0, 30) + '...');

      const fetchOptions = { method: 'GET' };

      // Noen proxyer videresender headers, andre ikke
      if (proxy.passHeaders) {
        fetchOptions.headers = { 'X-Auth-Token': API_KEY };
      }

      const targetUrl = proxy.url + encodeURIComponent(apiUrl + (proxy.passHeaders ? '' : '&X-Auth-Token=' + API_KEY));

      const controller = new AbortController();
      const timeoutId = setTimeout(function() { controller.abort(); }, 15000);
      fetchOptions.signal = controller.signal;

      const res = await fetch(targetUrl, fetchOptions);
      clearTimeout(timeoutId);

      if (!res.ok) {
        console.warn('Proxy ' + (i + 1) + ' returnerte HTTP ' + res.status);
        continue; // prøv neste proxy
      }

      // Sjekk at svaret faktisk er JSON (ikke en HTML-feilside)
      const contentType = res.headers.get('content-type') || '';
      const text = await res.text();

      if (!text.trim().startsWith('{') && !text.trim().startsWith('[')) {
        console.warn('Proxy ' + (i + 1) + ' returnerte ikke JSON (sannsynligvis en feilside)');
        continue; // prøv neste proxy
      }

      const data = JSON.parse(text);
      console.log('Proxy ' + (i + 1) + ' fungerte!');
      return data;

    } catch (e) {
      console.warn('Proxy ' + (i + 1) + ' feilet:', e.message);
      continue; // prøv neste proxy
    }
  }
  throw new Error('Alle proxyer feilet. Sjekk internettforbindelsen eller prov igjen senere.');
}

/* ===== HOVEDFUNKSJON: HENT LIVE DATA ===== */
async function fetchLive() {
  if (isFetching) {
    setStatus('Henter allerede...');
    return;
  }
  isFetching = true;
  document.getElementById('updateBtn').classList.add('loading');
  setStatus('Henter live data...');
  clearErrors();

  try {
    const apiUrl = 'https://api.football-data.org/v4/competitions/' + COMPETITION_ID + '/matches?limit=500';
    const data = await fetchWithProxy(apiUrl);

    console.log('API Response:', data);

    if (!data || !Array.isArray(data.matches)) {
      throw new Error('Ugyldig API-respons: mangler matches-array');
    }

    const updated = Object.assign({}, results);
    let matchedCount = 0;
    let totalFetched = data.matches.length;
    console.log('Sjekker ' + totalFetched + ' kamper fra API...');

    data.matches.forEach(function(match) {
      try {
        // Hent lagnavn fra API
        var rawHome = '';
        if (match.homeTeam) {
          rawHome = match.homeTeam.name || match.homeTeam.shortName || match.homeTeam.tla || '';
        }
        var rawAway = '';
        if (match.awayTeam) {
          rawAway = match.awayTeam.name || match.awayTeam.shortName || match.awayTeam.tla || '';
        }

        // Hent resultat
        var fullHome = (match.score && match.score.fullTime) ? match.score.fullTime.home : null;
        var fullAway = (match.score && match.score.fullTime) ? match.score.fullTime.away : null;
        var isFinished = match.status === 'FINISHED' || (fullHome !== null && fullHome !== undefined);
        var score = isFinished ? (fullHome + '-' + fullAway) : null;

        // Prøv flere matchingstrategier
        var foundMatch = null;

        // 1) Kanonisk navnmatch begge veier
        foundMatch = MATCHES.find(function(m) {
          return namesMatchAdvanced(m.home, rawHome) && namesMatchAdvanced(m.away, rawAway);
        });
        if (!foundMatch) {
          foundMatch = MATCHES.find(function(m) {
            return namesMatchAdvanced(m.home, rawAway) && namesMatchAdvanced(m.away, rawHome);
          });
        }

        // 2) Token-overlap fallback
        if (!foundMatch) {
          foundMatch = MATCHES.find(function(m) {
            return tokenOverlap(m.home, rawHome) >= 0.5 && tokenOverlap(m.away, rawAway) >= 0.5;
          });
          if (!foundMatch) {
            foundMatch = MATCHES.find(function(m) {
              return tokenOverlap(m.home, rawAway) >= 0.5 && tokenOverlap(m.away, rawHome) >= 0.5;
            });
          }
        }

        // 3) TLA-fallback
        if (!foundMatch) {
          var apiHomeTla = (match.homeTeam && match.homeTeam.tla) ? String(match.homeTeam.tla).toLowerCase() : '';
          var apiAwayTla = (match.awayTeam && match.awayTeam.tla) ? String(match.awayTeam.tla).toLowerCase() : '';
          if (apiHomeTla && apiAwayTla) {
            foundMatch = MATCHES.find(function(m) {
              var mh = normalize(m.home).split(' ')[0];
              var ma = normalize(m.away).split(' ')[0];
              return (mh === apiHomeTla && ma === apiAwayTla) || (mh === apiAwayTla && ma === apiHomeTla);
            });
          }
        }

        if (foundMatch) {
          updated[foundMatch.id] = {
            score: score,
            status: match.status,
            date: match.utcDate,
            homeName: rawHome,
            awayName: rawAway,
            apiId: match.id
          };
          if (score) matchedCount++;
          console.log('Matched: ' + rawHome + ' ' + (score || 'ikke spilt') + ' ' + rawAway + ' -> local id ' + foundMatch.id);
        } else {
          if (rawHome || rawAway) {
            console.log('Ikke i listen:', {
              apiId: match.id, rawHome: rawHome, rawAway: rawAway,
              tlaHome: match.homeTeam ? match.homeTeam.tla : '',
              tlaAway: match.awayTeam ? match.awayTeam.tla : '',
              utcDate: match.utcDate
            });
          }
        }
      } catch (e) {
        console.error('Error processing match', e, match);
      }
    });

    results = updated;
    fetchRetries = 0;
    lastFetchTime = new Date();
    render();
    setStatus('Oppdatert: ' + lastFetchTime.toLocaleTimeString() + ' (' + matchedCount + '/' + MATCHES.length + ' ferdige)');
    console.log('Total hentet: ' + totalFetched + ' kamper, matched ' + matchedCount + ' ferdige');

  } catch (error) {
    console.error('Fetch error:', error);
    if (fetchRetries < MAX_RETRIES) {
      fetchRetries++;
      setStatus('Forsøker igjen (' + fetchRetries + '/' + MAX_RETRIES + ')...', true);
      setTimeout(fetchLive, 2000 + (fetchRetries * 2000));
    } else {
      showError('Kunne ikke hente data: ' + error.message + '. Prøv å trykke Oppdater om noen minutter.');
      setStatus('Feil ved henting - prøv igjen senere', true);
    }
  } finally {
    isFetching = false;
    document.getElementById('updateBtn').classList.remove('loading');
  }
}

/* ===== RENDERING ===== */
function render() {
  if (currentTab === 'leaderboard') renderLeaderboard();
  else renderMatches();
  updateMatchCount();
}

function renderLeaderboard() {
  var scores = PLAYERS.map(function(p, i) {
    var total = 0;
    var details = [];
    MATCHES.forEach(function(m) {
      if (results[m.id] && results[m.id].score) {
        var pts = points(results[m.id].score, m.tips[i]);
        total += pts;
        details.push({ home: m.home, away: m.away, tip: m.tips[i], actual: results[m.id].score, points: pts });
      }
    });
    return { p: p, total: total, details: details };
  }).sort(function(a, b) { return b.total - a.total; });

  var app = document.getElementById('app');
  if (scores.every(function(s) { return s.total === 0; }) && Object.keys(results).length === 0) {
    app.innerHTML = '<div class="empty-state">Venter paa kamper...</div>';
    return;
  }

  var html = '<div class="card"><div class="row"><div style="font-weight:800">Live tippetabell</div><div class="small">Oppdatert: ' + (lastFetchTime ? lastFetchTime.toLocaleTimeString() : '\u2014') + '</div></div></div>';

  html += scores.map(function(s, idx) {
    var detailsHtml = '';
    if (s.details.length) {
      detailsHtml = s.details.map(function(d) {
        return '<div class="details-item"><div class="left">' + d.home + ' vs ' + d.away + '<div class="small">Tip: ' + d.tip + '</div></div><div class="right">' + (d.actual || '\u2013') + ' <span style="color:#7be2a4; font-weight:700">' + (d.actual ? ('+' + d.points) : '') + '</span></div></div>';
      }).join('');
    } else {
      detailsHtml = '<div class="small">Ingen ferdige kamper enda</div>';
    }
    return '<details class="player" ' + (idx < 3 ? 'open' : '') + '><summary><div class="details-row"><div>' + (idx + 1) + '. <span class="player-name">' + s.p + '</span></div><div class="gold">' + s.total + ' pts</div></div></summary><div class="details-list">' + detailsHtml + '</div></details>';
  }).join('');

  app.innerHTML = html;
}

function renderMatches() {
  var app = document.getElementById('app');
  var played = MATCHES.filter(function(m) { return results[m.id] && results[m.id].score; });
  var upcoming = MATCHES.filter(function(m) { return !results[m.id] || !results[m.id].score; });

  var html = '<div class="card"><div style="font-weight:800">Kamper</div><div class="small">Ferdigspilte kamper er gruppert per dag. Kommende kamper vises under.</div></div>';

  if (played.length === 0) {
    html += '<div class="card"><div class="empty-state">Ingen kamper er ferdigspilt enda.</div></div>';
  } else {
    var byDay = {};
    played.forEach(function(m) {
      var r = results[m.id];
      var date = r.date ? new Date(r.date) : null;
      var dayStr = date ? date.toLocaleDateString('no-NO', { weekday: 'short', day: '2-digit', month: 'short' }) : 'Ukjent dato';
      if (!byDay[dayStr]) byDay[dayStr] = [];
      byDay[dayStr].push({ match: m, res: r });
    });
    var dayKeys = Object.keys(byDay).sort(function(a, b) { return new Date(byDay[b][0].res.date) - new Date(byDay[a][0].res.date); });
    dayKeys.forEach(function(day) {
      var items = byDay[day];
      html += '<details class="matches-day" open><summary>' + day + ' \u2014 ' + items.length + ' kamp(er)</summary><div style="margin-top:8px">';
      items.forEach(function(it) {
        var m = it.match;
        var r = it.res;
        html += '<div class="match-card"><div class="match-row"><div><strong>' + m.home + '</strong> vs <strong>' + m.away + '</strong></div><div class="match-score">' + r.score + '</div></div><div class="match-meta small">Status: ' + (r.status || '\u2014') + ' \u2022 Spilt: ' + (r.date ? new Date(r.date).toLocaleTimeString() : '\u2014') + '</div><div class="player-tips">' + m.tips.map(function(t, i) { return '<div class="tip-pill">' + PLAYERS[i] + ': ' + t + (r.score ? (' \u2192 ' + points(r.score, t) + 'p') : '') + '</div>'; }).join('') + '</div></div>';
      });
      html += '</div></details>';
    });
  }

  html += '<div class="card"><div style="font-weight:800">Kommende kamper</div><div class="small">Viser tips for kommende kamper.</div></div>';
  if (upcoming.length === 0) {
    html += '<div class="card"><div class="empty-state">Ingen kommende kamper.</div></div>';
  } else {
    upcoming.forEach(function(m) {
      var dateInfo = '';
      if (results[m.id] && results[m.id].date) {
        var d = new Date(results[m.id].date);
        dateInfo = d.toLocaleDateString('no-NO', { day: '2-digit', month: 'short' }) + ' kl. ' + d.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
      }
      html += '<div class="match-card"><div class="match-row"><div><strong>' + m.home + '</strong> vs <strong>' + m.away + '</strong></div><div class="match-meta small">' + (dateInfo || 'Dato TBD') + '</div></div><div class="player-tips">' + m.tips.map(function(t, i) { return '<div class="tip-pill">' + PLAYERS[i] + ': ' + t + '</div>'; }).join('') + '</div></div>';
    });
  }

  app.innerHTML = html;
}

function updateMatchCount() {
  var playedCount = MATCHES.filter(function(m) { return results[m.id] && results[m.id].score; }).length;
  document.getElementById('matchCount').innerText = playedCount + ' / ' + MATCHES.length + ' kamper oppdatert';
}

/* ===== FANER ===== */
function setTab(tab) {
  currentTab = tab;
  document.getElementById('tabLeaderboard').classList.toggle('active', tab === 'leaderboard');
  document.getElementById('tabMatches').classList.toggle('active', tab === 'matches');
  render();
}

/* ===== MANUELL OPPDATERING ===== */
async function handleUpdate() {
  fetchRetries = 0; // nullstill retries ved manuell oppdatering
  await fetchLive();
}

/* ===== OPPSTART ===== */
window.addEventListener('load', function() {
  console.log('Tippeliga Live starter med football-data.org...');
  console.log('Competition: World Cup 2026');
  console.log('Matches loaded:', MATCHES.length);
  console.log('Proxyer konfigurert:', PROXIES.length);
  fetchLive();
});

// Auto-oppdater hvert 5. minutt (i stedet for hvert 30. sekund)
setInterval(fetchLive, UPDATE_INTERVAL);

// Oppdater status-teksten hvert sekund
setInterval(function() {
  if (lastFetchTime) {
    var diff = Math.floor((Date.now() - lastFetchTime) / 1000);
    var min = Math.floor(diff / 60);
    var sec = diff % 60;
    var timeStr = min > 0 ? (min + 'm ' + sec + 's siden') : (sec + 's siden');
    document.getElementById('status').innerText = 'Sist oppdatert: ' + timeStr;
  }
}, 1000);
</script>
