<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Tippeliga Live - VM 2026 resultater og poengstilling">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>⚽</text></svg>">
<title>Tippeliga Live</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui;
  background: #080c14;
  color: #e8eaf0;
  padding-bottom: 20px;
}

.header {
  text-align: center;
  padding: 20px;
  background: #0f1c30;
  border-bottom: 1px solid #1a2a40;
  position: sticky;
  top: 0;
  z-index: 10;
}

.title {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 2px;
  margin: 0;
}

.sub {
  font-size: 12px;
  color: #7a8ba8;
  margin: 8px 0;
}

.btn {
  margin-top: 10px;
  padding: 8px 16px;
  background: #c8a84b22;
  border: 1px solid #c8a84b55;
  color: #c8a84b;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s ease;
}

.btn:hover {
  background: #c8a84b44;
  border-color: #c8a84baa;
}

.btn:active {
  transform: scale(0.98);
}

.btn.loading {
  opacity: 0.6;
  cursor: not-allowed;
}

.container {
  max-width: 600px;
  margin: 0 auto;
}

.card {
  background: #0f1520;
  border: 1px solid #1a2840;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
  transition: all 0.2s ease;
}

.card:hover {
  border-color: #2a3a50;
  background: #141b28;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.player-name {
  font-weight: 600;
  font-size: 16px;
}

.rank {
  color: #7a8ba8;
  font-size: 14px;
  min-width: 30px;
}

.gold {
  color: #c8a84b;
  font-weight: bold;
  font-size: 18px;
}

.match-info {
  font-size: 12px;
  color: #7a8ba8;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid #1a2840;
}

.match-row {
  display: flex;
  justify-content: space-between;
  margin: 4px 0;
  font-size: 13px;
}

.match-result {
  color: #c8a84b;
  font-weight: bold;
}

.match-score {
  color: #7a8ba8;
  font-weight: bold;
}

.error-box {
  background: #3a1a1a;
  border: 1px solid #8a3a3a;
  color: #ff6b6b;
  padding: 12px;
  border-radius: 8px;
  margin: 10px;
  font-size: 13px;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #7a8ba8;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="header">
  <h1 class="title">⚽ TIPPELIGA LIVE</h1>
  <div class="sub" id="status">Starter...</div>
  <button class="btn" id="updateBtn" onclick="handleUpdate()">↻ Oppdater</button>
  <div class="sub" id="matchCount"></div>
</div>

<div class="container">
  <div id="errors"></div>
  <div id="app"></div>
</div>

<script>

// Football-Data.org API
const API_KEY = "532ab6db012744d0912eedbd40c4764d";
const COMPETITION_ID = "WC"; // World Cup

const PLAYERS = ["Staals", "Kong", "Dox", "Jojo", "Marko", "Barra"];

const MATCHES = [
  {id:1, home:"Mexico", away:"South Africa", tips:["3-0","2-1","2-0","3-1","2-1","3-0"]},
  {id:2, home:"South Korea", away:"Czechia", tips:["2-1","1-1","1-1","2-3","1-0","1-2"]},
  {id:3, home:"Canada", away:"Bosnia and Herzegovina", tips:["1-1","0-1","2-1","2-0","1-1","2-0"]},
  {id:4, home:"United States", away:"Paraguay", tips:["2-1","1-1","0-0","2-3","3-0","2-1"]},
  {id:5, home:"Qatar", away:"Switzerland", tips:["0-3","0-3","0-1","1-3","0-2","0-3"]},
  {id:6, home:"Brazil", away:"Morocco", tips:["2-2","1-1","3-1","2-2","2-1","2-1"]},
  {id:7, home:"Haiti", away:"Scotland", tips:["0-2","1-2","0-1","1-1","0-2","1-2"]},
  {id:8, home:"Australia", away:"Turkey", tips:["1-1","2-1","1-0","2-0","1-1","2-1"]},
  {id:9, home:"Germany", away:"Curaçao", tips:["3-0","2-0","3-1","4-0","3-0","2-0"]},
  {id:10, home:"Netherlands", away:"Japan", tips:["2-1","1-1","2-0","3-0","2-1","1-0"]},
  {id:11, home:"Ivory Coast", away:"Ecuador", tips:["1-1","2-1","1-0","2-0","1-1","1-2"]},
  {id:12, home:"Sweden", away:"Tunisia", tips:["1-1","1-0","1-1","2-0","1-1","1-2"]},
  {id:13, home:"Spain", away:"Cape Verde", tips:["3-0","2-0","3-1","4-0","2-0","3-1"]},
  {id:14, home:"Belgium", away:"Egypt", tips:["2-1","1-0","2-0","3-0","2-1","1-1"]},
  {id:15, home:"Saudi Arabia", away:"Uruguay", tips:["0-2","1-3","0-2","1-2","0-3","1-3"]},
  {id:16, home:"Iran", away:"New Zealand", tips:["1-1","2-0","1-0","2-1","1-1","0-1"]},
  {id:17, home:"France", away:"Senegal", tips:["2-1","1-0","2-0","3-0","2-1","1-1"]},
  {id:18, home:"Iraq", away:"Norway", tips:["1-1","1-0","1-1","2-1","1-1","0-2"]},
  {id:19, home:"Argentina", away:"Algeria", tips:["2-1","1-0","2-0","3-0","2-1","1-1"]},
  {id:20, home:"Austria", away:"Jordan", tips:["2-1","1-0","2-0","3-0","2-1","1-0"]}
];

let results = {};
let lastFetchTime = null;
let isFetching = false;
let fetchRetries = 0;
const MAX_RETRIES = 3;

// Normalize team names safely (handles null/undefined)
function normalize(str) {
  if (!str) return "";
  return String(str).toLowerCase()
    .replace(/[àáäâ]/g, 'a')
    .replace(/[èéëê]/g, 'e')
    .replace(/[ìíïî]/g, 'i')
    .replace(/[òóöô]/g, 'o')
    .replace(/[ùúüû]/g, 'u')
    .replace(/[ñ]/g, 'n')
    .replace(/[ç]/g, 'c')
    .replace(/[’'`]/g, '')
    .replace(/[^a-z0-9]/g, '')
    .trim();
}

function points(actual, tip) {
  if (!actual) return 0;
  if (actual === tip) return 4;

  try {
    const a = actual.split("-").map(Number);
    const t = tip.split("-").map(Number);

    if (a.length !== 2 || t.length !== 2) return 0;

    const ra = Math.sign(a[0] - a[1]);
    const rt = Math.sign(t[0] - t[1]);

    return ra === rt ? 2 : 0;
  } catch (e) {
    return 0;
  }
}

function setStatus(text, isError = false) {
  const el = document.getElementById("status");
  el.innerText = text;
  el.style.color = isError ? "#ff6b6b" : "#7a8ba8";
}

function showError(message) {
  const errBox = document.getElementById("errors");
  errBox.innerHTML = `<div class="error-box">⚠️ ${message}</div>`;
}

function clearErrors() {
  document.getElementById("errors").innerHTML = "";
}

// Helper: check if two normalized names match (allow partial matches)
function namesMatch(normA, normB) {
  if (!normA || !normB) return false;
  return normA === normB || normA.includes(normB) || normB.includes(normA);
}

async function fetchLive() {
  if (isFetching) {
    setStatus("Henter allerede...");
    return;
  }

  isFetching = true;
  document.getElementById("updateBtn").classList.add("loading");
  setStatus("Henter live data...");
  clearErrors();

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 30000);

    // Football-Data.org API med CORS proxy - hent ALLE kamper
    const proxyUrl = "https://corsproxy.io/?";
    const apiUrl = `https://api.football-data.org/v4/competitions/${COMPETITION_ID}/matches?limit=500`;

    const res = await fetch(proxyUrl + encodeURIComponent(apiUrl), {
      method: "GET",
      headers: {
        "X-Auth-Token": API_KEY
      },
      signal: controller.signal
    });

    clearTimeout(timeoutId);

    if (!res.ok) {
      throw new Error(`API svar: ${res.status} - ${res.statusText}`);
    }

    const data = await res.json();
    console.log("API Response:", data);

    if (!data || !Array.isArray(data.matches)) {
      console.error("API response:", data);
      throw new Error("Ugyldig API respons");
    }

    const updated = { ...results };
    let matchedCount = 0;
    let totalFetched = data.matches.length;

    console.log(`📊 Sjekker ${totalFetched} kamper fra API...`);

    data.matches.forEach(match => {
      // Safely extract team names (some entries may have null fields)
      const rawHome = match.homeTeam && (match.homeTeam.name || match.homeTeam.shortName || match.homeTeam.tla || match.homeTeam.id) ? (match.homeTeam.name || match.homeTeam.shortName || match.homeTeam.tla || String(match.homeTeam.id)) : '';
      const rawAway = match.awayTeam && (match.awayTeam.name || match.awayTeam.shortName || match.awayTeam.tla || match.awayTeam.id) ? (match.awayTeam.name || match.awayTeam.shortName || match.awayTeam.tla || String(match.awayTeam.id)) : '';

      const home = normalize(rawHome);
      const away = normalize(rawAway);

      const fullHome = match.score && match.score.fullTime ? match.score.fullTime.home : null;
      const fullAway = match.score && match.score.fullTime ? match.score.fullTime.away : null;
      const score = (fullHome !== null && fullHome !== undefined) ? `${fullHome}-${fullAway}` : null;

      // Find a MATCHES entry that matches either orientation and allow partial name matching
      const foundMatch = MATCHES.find(m => {
        const mh = normalize(m.home);
        const ma = normalize(m.away);

        // direct or partial match home->home and away->away
        if (namesMatch(mh, home) && namesMatch(ma, away)) return true;
        // swapped orientation: API might list teams in opposite order
        if (namesMatch(mh, away) && namesMatch(ma, home)) return true;
        return false;
      });

      if (foundMatch) {
        updated[foundMatch.id] = {
          score: score,
          status: match.status,
          date: match.utcDate,
          homeName: rawHome,
          awayName: rawAway
        };
        if (score) matchedCount++;
        console.log(`✓ Matched: ${rawHome} ${score || 'ikke spilt'} ${rawAway}`);
      } else {
        // Not one of the matches we track
        if (rawHome || rawAway) {
          console.log(`○ Ikke i listen: ${rawHome || '?'} vs ${rawAway || '?'} (normalized: ${home} vs ${away})`);
        }
      }
    });

    results = updated;
    fetchRetries = 0;
    lastFetchTime = new Date();

    render();
    setStatus(`Oppdatert: ${lastFetchTime.toLocaleTimeString()} (${matchedCount}/${MATCHES.length})`);
    console.log(`✓ Total hentet: ${totalFetched} kamper, matched ${matchedCount} ferdige`);

  } catch (error) {
    console.error("Fetch error:", error);

    if (fetchRetries < MAX_RETRIES) {
      fetchRetries++;
      setStatus(`Forsøker igjen (${fetchRetries}/${MAX_RETRIES})...`, true);
      setTimeout(fetchLive, 2000 + (fetchRetries * 1000));
    } else {
      showError(`Kunne ikke hente data: ${error.message}`);
      setStatus("Feil ved henting - prøv igjen senere", true);
    }
  } finally {
    isFetching = false;
    document.getElementById("updateBtn").classList.remove("loading");
  }
}

function render() {
  const scores = PLAYERS.map((p, i) => {
    let total = 0;
    let matchDetails = [];

    MATCHES.forEach(m => {
      if (results[m.id]) {
        const pts = points(results[m.id].score, m.tips[i]);
        total += pts;
        matchDetails.push({
          home: m.home,
          away: m.away,
          tip: m.tips[i],
          actual: results[m.id].score,
          points: pts
        });
      }
    });

    return { p, total, matchDetails };

  }).sort((a, b) => b.total - a.total);

  const appDiv = document.getElementById("app");
  
  if (scores.every(s => s.total === 0) && Object.keys(results).length === 0) {
    appDiv.innerHTML = `<div class="empty-state">⏳ Venter på kamper...</div>`;
    return;
  }

  appDiv.innerHTML = scores.map((s, i) => `
    <div class="card">
      <div class="row">
        <div>
          <span class="rank">#${i + 1}</span>
          <span class="player-name">${s.p}</span>
        </div>
        <div class="gold">${s.total} pts</div>
      </div>
      ${s.matchDetails.length > 0 ? `
        <div class="match-info">
          ${s.matchDetails.map(m => `
            <div class="match-row">
              <span>${m.home} vs ${m.away}</span>
              <span>
                <span class="match-score">${m.actual || '–'}</span>
                <span> (tip: ${m.tip})</span>
                <span class="match-result"> ${m.actual ? '+'+ m.points : ''}</span>
              </span>
            </div>
          `).join("")}
        </div>
      ` : ""}
    </div>
  `).join("");

  const matchCount = Object.keys(results).length;
  document.getElementById("matchCount").innerText = 
    `${matchCount} / ${MATCHES.length} kamper oppdatert`;
}

async function handleUpdate() {
  await fetchLive();
}

// Init
window.addEventListener("load", () => {
  console.log("🚀 Tippeliga Live starter med football-data.org...");
  console.log("✓ API Key set");
  console.log("✓ Competition: World Cup 2026");
  console.log("✓ Matches loaded:", MATCHES.length);
  console.log("✓ Using CORS proxy");
  fetchLive();
});

// Auto-update hvert 30. sekund
setInterval(fetchLive, 30000);

// Update status hver sekund
setInterval(() => {
  if (lastFetchTime) {
    const diff = Math.floor((Date.now() - lastFetchTime) / 1000);
    const min = Math.floor(diff / 60);
    const sec = diff % 60;
    const timeStr = min > 0 ? `${min}m ${sec}s siden` : `${sec}s siden`;
    document.getElementById("status").innerText = `Sist oppdatert: ${timeStr}`;
  }
}, 1000);

</script>

</body>
</html>
