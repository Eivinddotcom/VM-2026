   POENGBEREGNING
   ============================================================ */
function points(actual, tip) {
  if (!actual) return 0;
  if (actual === tip) return 4;
  try {
    var a = actual.split("-").map(Number);
    var t = tip.split("-").map(Number);
    if (a.length !== 2 || t.length !== 2) return 0;
    return Math.sign(a[0] - a[1]) === Math.sign(t[0] - t[1]) ? 2 : 0;
  } catch (e) { return 0; }
}

function findLocalMatch(apiMatch) {
  var homeTla = (apiMatch.homeTeam && apiMatch.homeTeam.tla) ? apiMatch.homeTeam.tla.toUpperCase() : "";
  var awayTla = (apiMatch.awayTeam && apiMatch.awayTeam.tla) ? apiMatch.awayTeam.tla.toUpperCase() : "";
  if (homeTla && awayTla) {
    var key = homeTla + "-" + awayTla;
    if (TLA_PAIR[key]) return TLA_PAIR[key];
  }
  return null;
}

  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      results: results,
      time: lastFetchTime ? lastFetchTime.toISOString() : null
    }));
  } catch (e) {}
}

function loadCache() {
  try {
    for (var i = localStorage.length - 1; i >= 0; i--) {
      var key = localStorage.key(i);
      if (key && key.indexOf("tippeliga_") === 0 && key !== CACHE_KEY) {
        localStorage.removeItem(key);
      }
    }
    var raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return false;
    var parsed = JSON.parse(raw);
    if (parsed.results) {
      results = parsed.results;
      lastFetchTime = parsed.time ? new Date(parsed.time) : null;
      return true;
    }
  } catch (e) {}
  return false;
}

/* ============================================================

   ============================================================ */
function tryFetch(url, options, timeout) {
  return new Promise(function(resolve, reject) {
    var controller = new AbortController();
    var tid = setTimeout(function() { controller.abort(); }, timeout);
    options.signal = controller.signal;
    fetch(url, options).then(function(res) {
      clearTimeout(tid);
      if (!res.ok) { reject(new Error("HTTP " + res.status)); return; }
      return res.text();
    }).then(function(text) {
      if (!text) { reject(new Error("Tom")); return; }
      var t = text.trim();
      if (t.charAt(0) !== "{" && t.charAt(0) !== "[") { reject(new Error("Ikke JSON")); return; }
      resolve(JSON.parse(t));
    }).catch(function(e) { clearTimeout(tid); reject(e); });
  });
}

  var headers = { "X-Auth-Token": API_KEY };
  var direct = tryFetch(apiUrl, { method: "GET", headers: headers }, 8000);
  var proxy = tryFetch("https://corsproxy.io/?" + encodeURIComponent(apiUrl), { method: "GET", headers: headers }, 10000);
  if (typeof Promise.any === "function") return Promise.any([direct, proxy]);
  return direct.catch(function() { return proxy; });
}

/* ============================================================
   HOVEDFUNKSJON
   ============================================================ */
function fetchLive() {
  if (isFetching) return Promise.resolve();
  isFetching = true;
  document.getElementById("updateBtn").classList.add("loading");
  setStatus("Henter live data...");
  clearErrors();

  var apiUrl = "https://api.football-data.org/v4/competitions/" + COMPETITION_ID + "/matches?limit=500";

  return fetchData(apiUrl)
    .then(function(data) {
      if (!data || !Array.isArray(data.matches)) throw new Error("Ugyldig API-respons");

      var updated = {};
      for (var k in results) { if (results.hasOwnProperty(k)) updated[k] = results[k]; }

      var matchedFinished = 0;
      var matchedTotal = 0;

      data.matches.forEach(function(match) {
        var rawHome = (match.homeTeam && (match.homeTeam.name || match.homeTeam.shortName)) || "?";
        var rawAway = (match.awayTeam && (match.awayTeam.name || match.awayTeam.shortName)) || "?";
        var fullHome = (match.score && match.score.fullTime) ? match.score.fullTime.home : null;
        var fullAway = (match.score && match.score.fullTime) ? match.score.fullTime.away : null;
        var hasScore = (fullHome !== null && fullHome !== undefined && fullAway !== null && fullAway !== undefined);
        var score = hasScore ? (fullHome + "-" + fullAway) : null;

        var localMatch = findLocalMatch(match);
        if (localMatch) {
          matchedTotal++;
          updated[localMatch.id] = {
            score: score,
            status: match.status,
            date: match.utcDate,
            homeName: rawHome,
            awayName: rawAway,
            apiId: match.id
          };
          if (score) matchedFinished++;
        }
      });

      results = updated;
      fetchRetries = 0;
      lastFetchTime = new Date();
      saveCache();
      render();

      var missing = MATCHES.filter(function(m) { return !updated[m.id]; });
      if (missing.length > 0) {
        console.warn("Tippekamper IKKE funnet i API:", missing.map(function(m) { return "#" + m.id + " " + m.home + " vs " + m.away; }));
      }
      console.log("Matched: " + matchedTotal + "/" + MATCHES.length + ", ferdige: " + matchedFinished);
      setStatus("Oppdatert: " + lastFetchTime.toLocaleTimeString() + " (" + matchedFinished + "/" + MATCHES.length + " ferdige)");
    })
    .catch(function(error) {
      console.error("Fetch feilet:", error);
      if (fetchRetries < MAX_RETRIES) {
        fetchRetries++;
        setStatus("Forsok " + fetchRetries + "/" + MAX_RETRIES + "...", true);
        setTimeout(fetchLive, 3000 * fetchRetries);
      } else {
        showError("Kunne ikke hente data: " + error.message);
        setStatus("Feil ved henting", true);
      }
    })
    .finally(function() {
      isFetching = false;
      document.getElementById("updateBtn").classList.remove("loading");
    });
}

/* ============================================================
   RENDERING
   ============================================================ */
function render() {
  if (currentTab === "leaderboard") renderLeaderboard();
  else renderMatches();
  updateMatchCount();
}

function statusLabel(s) {
  if (s === "FINISHED") return "Ferdig";
  if (s === "IN_PLAY") return '<span class="live-badge">LIVE</span>';
  if (s === "PAUSED") return '<span class="live-badge">Pause</span>';
  if (s === "TIMED" || s === "SCHEDULED") return "Kommende";
  if (s === "POSTPONED") return "Utsatt";
  return s || "Ukjent";
}

function renderLeaderboard() {
  var scores = PLAYERS.map(function(p, i) {
    var total = 0, exact = 0, correct = 0, wrong = 0, details = [];
    MATCHES.forEach(function(m) {
      if (results[m.id] && results[m.id].score) {
        var pts = points(results[m.id].score, m.tips[i]);
        total += pts;
        if (pts === 4) exact++;
        else if (pts === 2) correct++;
        else wrong++;
        details.push({ home: m.home, away: m.away, tip: m.tips[i], actual: results[m.id].score, points: pts });
      }
    });
    return { p: p, total: total, exact: exact, correct: correct, wrong: wrong, details: details };
  }).sort(function(a, b) { return b.total - a.total; });

  var app = document.getElementById("app");
  if (scores.every(function(s) { return s.total === 0; }) && Object.keys(results).length === 0) {
    app.innerHTML = '<div class="empty-state">Venter paa data fra API...</div>';
    return;
  }

  var html = '<div class="card"><div class="row"><div style="font-weight:800">Live tippetabell</div><div class="small">Oppdatert: ' + (lastFetchTime ? lastFetchTime.toLocaleTimeString() : "\u2014") + "</div></div></div>";

  html += scores.map(function(s, idx) {
    var statsLine = '<div class="small" style="margin-top:4px">' + s.details.length + ' kamper bedoemt \u2022 ' + s.exact + ' eksakte \u2022 ' + s.correct + ' riktig utfall \u2022 ' + s.wrong + ' feil</div>';

    var dHtml = "";
    if (s.details.length) {
      dHtml = s.details.map(function(d) {
        var color = d.points === 4 ? "#7be2a4" : d.points === 2 ? "#c8c878" : "#ff8b8b";
        return '<div class="details-item"><div class="left">' + d.home + " vs " + d.away + '<div class="small">Tip: ' + d.tip + '</div></div><div class="right">' + d.actual + ' <span style="color:' + color + ';font-weight:700">+' + d.points + "</span></div></div>";
      }).join("");
    } else {
      dHtml = '<div class="small">Ingen ferdige kamper enda</div>';
    }
    return '<details class="player" ' + (idx < 3 ? "open" : "") + '><summary><div class="details-row"><div>' + (idx + 1) + '. <span class="player-name">' + s.p + '</span></div><div class="gold">' + s.total + " pts</div></div></summary>" + statsLine + '<div class="details-list">' + dHtml + "</div></details>";
  }).join("");

  app.innerHTML = html;
}

function renderMatches() {
  var app = document.getElementById("app");
  var played = MATCHES.filter(function(m) { return results[m.id] && results[m.id].score; });
  var upcoming = MATCHES.filter(function(m) { return !results[m.id] || !results[m.id].score; });

  var html = '<div class="card"><div style="font-weight:800">Alle ' + MATCHES.length + ' tippekamper</div><div class="small">' + played.length + ' ferdigspilte, ' + upcoming.length + ' kommende</div></div>';

  if (played.length > 0) {
    var byDay = {};
    played.forEach(function(m) {
      var r = results[m.id];
      var date = r.date ? new Date(r.date) : null;
      var dayStr = date ? date.toLocaleDateString("no-NO", { weekday: "short", day: "2-digit", month: "short" }) : "Ukjent dato";
      if (!byDay[dayStr]) byDay[dayStr] = [];
      byDay[dayStr].push({ match: m, res: r });
    });
    var dayKeys = Object.keys(byDay).sort(function(a, b) {
      return new Date(byDay[b][0].res.date) - new Date(byDay[a][0].res.date);
    });
    dayKeys.forEach(function(day) {
      var items = byDay[day];
      html += '<details class="matches-day" open><summary>' + day + " \u2014 " + items.length + " kamp(er)</summary><div style=\"margin-top:8px\">";
      items.forEach(function(it) {
        var m = it.match, r = it.res;
        html += '<div class="match-card"><div class="match-row"><div><strong>' + m.home + "</strong> vs <strong>" + m.away + "</strong></div><div class=\"match-score\">" + r.score + "</div></div>";
        html += '<div class="match-meta small">' + statusLabel(r.status) + " \u2022 " + (r.date ? new Date(r.date).toLocaleString("no-NO") : "\u2014") + "</div>";
        html += '<div class="player-tips">' + m.tips.map(function(t, i) {
          var p = points(r.score, t);
          var color = p === 4 ? "#7be2a4" : p === 2 ? "#c8c878" : "#ff8b8b";
          return '<div class="tip-pill">' + PLAYERS[i] + ": " + t + ' <span style="color:' + color + ';font-weight:700">\u2192 ' + p + "p</span></div>";
        }).join("") + "</div></div>";
      });
      html += "</div></details>";
    });
  } else {
    html += '<div class="card"><div class="empty-state">Ingen kamper er ferdigspilt enda.</div></div>';
  }

  html += '<div class="card" style="margin-top:16px"><div style="font-weight:800">Kommende kamper</div></div>';
  if (upcoming.length === 0) {
    html += '<div class="card"><div class="empty-state">Alle kamper er ferdigspilt!</div></div>';
  } else {
    upcoming.forEach(function(m) {
      var r = results[m.id];
      var dateInfo = "", statusInfo = "";
      if (r && r.date) {
        var d = new Date(r.date);
        dateInfo = d.toLocaleDateString("no-NO", { weekday: "short", day: "2-digit", month: "short" }) + " kl. " + d.toLocaleTimeString("no-NO", { hour: "2-digit", minute: "2-digit" });
      }
      if (r && r.status) statusInfo = statusLabel(r.status);
      html += '<div class="match-card"><div class="match-row"><div><strong>' + m.home + "</strong> vs <strong>" + m.away + "</strong></div><div class=\"match-meta small\">" + (dateInfo || "Dato TBD") + (statusInfo ? " \u2022 " + statusInfo : "") + "</div></div>";
      html += '<div class="player-tips">' + m.tips.map(function(t, i) {
        return '<div class="tip-pill">' + PLAYERS[i] + ": " + t + "</div>";
      }).join("") + "</div></div>";
    });
  }

  app.innerHTML = html;
}

function updateMatchCount() {
  var n = MATCHES.filter(function(m) { return results[m.id] && results[m.id].score; }).length;
  document.getElementById("matchCount").innerText = n + " / " + MATCHES.length + " kamper har resultat";
}

/* ============================================================
   FANER OG OPPDATERING
   ============================================================ */
function setTab(tab) {
  currentTab = tab;
  document.getElementById("tabLeaderboard").classList.toggle("active", tab === "leaderboard");
  document.getElementById("tabMatches").classList.toggle("active", tab === "matches");
  render();
}

function handleUpdate() {
  fetchRetries = 0;
  fetchLive();
}

/* ============================================================
   OPPSTART
   ============================================================ */
window.addEventListener("load", function() {
  console.log("Tippeliga Live " + CACHE_VERSION + " | " + MATCHES.length + " kamper | " + (Object.keys(TLA_PAIR).length / 2) + " TLA-par");
  if (loadCache()) { render(); setStatus("Viser cachet data, henter fersk..."); }
  fetchLive();
});

setInterval(fetchLive, UPDATE_INTERVAL);
setInterval(function() {
  if (lastFetchTime && !isFetching) {
    var diff = Math.floor((Date.now() - lastFetchTime) / 1000);
    var min = Math.floor(diff / 60);
    var sec = diff % 60;
    document.getElementById("status").innerText = "Sist oppdatert: " + (min > 0 ? min + "m " : "") + sec + "s siden";
  }
}, 1000);
</script>
